<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custom Test Practicer 9000</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273549;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #60a5fa;
    --good: #22c55e;
    --bad: #ef4444;
    --warn: #f59e0b;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    /* Arial/Helvetica matches the standard online test interface and most
       published prep materials. Keep this generic so it feels like the real test. */
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(1200px 800px at 20% -10%, #1d2a4d 0%, transparent 60%),
                radial-gradient(900px 700px at 100% 110%, #1a3a3a 0%, transparent 60%),
                var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 64px;
    min-height: 100vh;
  }
  header.app {
    width: min(820px, 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }
  header.app h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: .5px;
    background: linear-gradient(90deg, #60a5fa, #22d3ee, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(96,165,250,.3);
  }
  header.app .back {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  header.app .back:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .hidden { display: none !important; }

  /* ─── Home view ─── */
  .view-home { width: min(820px, 100%); }

  /* Grade selector */
  .grade-toggle {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .grade-pill {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
    font-family: inherit;
  }
  .grade-pill:hover { background: var(--panel-2); }
  .grade-pill .label { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .grade-pill .sub { font-size: 14px; color: var(--muted); }
  .grade-pill.active {
    border-color: var(--accent);
    background: rgba(96,165,250,.10);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .grade-pill.active .label { color: var(--accent); }

  .mode-toggle {
    display: flex;
    background: var(--panel);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 18px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .mode-toggle button {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 12px 16px;
    border-radius: 9px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s;
    font-family: inherit;
  }
  .mode-toggle button.active {
    background: var(--panel-2);
    color: var(--text);
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .mode-desc {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .review-panel {
    background: var(--panel);
    border: 1px solid rgba(245,158,11,.3);
    border-left: 4px solid var(--warn);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .review-panel .info { flex: 1; min-width: 200px; }
  .review-panel .title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .review-panel .meta { font-size: 15px; color: var(--muted); }
  .review-panel .meta strong { color: var(--text); }
  .review-panel .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .sections {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .section-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 18px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: transform .05s, background .15s, border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: inherit;
  }
  .section-card:hover:not(:disabled) {
    background: var(--panel-2);
    border-color: rgba(96,165,250,.4);
  }
  .section-card:active:not(:disabled) { transform: translateY(1px); }
  .section-card:disabled { cursor: not-allowed; opacity: .5; }
  .section-card .title { font-size: 17px; font-weight: 700; color: var(--text); }
  .section-card .meta { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .section-card .badge {
    align-self: flex-start;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(96,165,250,.15);
    color: var(--accent);
  }
  .section-card .badge.soon { background: rgba(148,163,184,.12); color: var(--muted); }

  .stats-summary {
    margin-top: 28px;
    padding: 16px 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    font-size: 15px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    align-items: center;
    justify-content: space-between;
  }
  .stats-summary strong { color: var(--text); font-weight: 700; }
  .stats-summary button {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ─── Quiz view ─── */
  .view-quiz { width: min(820px, 100%); }
  .quiz-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 16px;
    color: var(--muted);
    gap: 16px;
  }
  .quiz-bar .progress { flex: 1; min-width: 0; }
  .quiz-bar .progress-bar {
    height: 6px;
    background: rgba(255,255,255,.06);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
  }
  .quiz-bar .progress-bar > div {
    height: 100%;
    background: var(--accent);
    transition: width .25s ease;
  }
  .timer {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .timer.warn { color: var(--warn); border-color: var(--warn); }
  .timer.danger { color: var(--bad); border-color: var(--bad); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
  .stat-mini { font-size: 15px; flex-shrink: 0; }
  .stat-mini strong { color: var(--text); }

  .passage {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 14px;
    max-height: 45vh;
    overflow-y: auto;
    font-size: 17px;
    line-height: 1.6;
    color: var(--text);
  }
  .passage h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .5px;
  }
  .passage h3 .genre { color: var(--accent); font-weight: 600; }
  .passage p { margin: 0 0 12px; }
  .passage p:last-child { margin: 0; }

  .card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .prompt {
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 12px;
  }
  .word {
    text-align: center;
    font-weight: 800;
    letter-spacing: 2px;
    font-size: clamp(36px, 7vw, 56px);
    margin: 8px 0 28px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(96,165,250,.15);
  }
  .sentence {
    font-size: clamp(19px, 2.8vw, 22px);
    line-height: 1.6;
    text-align: center;
    margin: 12px 0 28px;
    color: var(--text);
    font-weight: 500;
    padding: 0 4px;
  }
  .sentence .blank {
    display: inline-block;
    min-width: 110px;
    height: 1.1em;
    border-bottom: 2px solid var(--accent);
    margin: 0 6px;
    vertical-align: -0.2em;
  }
  .math-q {
    font-size: clamp(22px, 3vw, 26px);
    font-weight: 600;
    text-align: center;
    margin: 12px 0 28px;
    color: var(--text);
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
    padding: 0 4px;
    white-space: pre-wrap;
  }

  /* Stacked fractions — matches what standardized tests use.
     vertical-align: middle puts the bar at the surrounding text's x-height,
     so "1 3/4" reads as a proper mixed number rather than a "1" floating
     above a dropped fraction. */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    font-size: 0.85em;
    line-height: 1.05;
    margin: 0 2px;
    font-variant-numeric: tabular-nums;
    /* nudge baseline-aligned neighbors (the whole number in a mixed number)
       up toward the fraction's middle so they don't sit too low */
    position: relative;
    top: -0.05em;
  }
  .frac .num {
    padding: 0 4px 1px;
    border-bottom: 1.5px solid currentColor;
    min-width: 0.7em;
    text-align: center;
  }
  .frac .den {
    padding: 1px 4px 0;
    min-width: 0.7em;
    text-align: center;
  }

  .question-text {
    font-size: clamp(17px, 2.5vw, 19px);
    line-height: 1.5;
    text-align: left;
    margin-bottom: 22px;
    color: var(--text);
    font-weight: 500;
  }
  .qc-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 18px 0 24px;
  }
  .qc-col {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }
  .qc-col .qc-label {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .qc-col .qc-val {
    font-size: clamp(20px, 2.8vw, 24px);
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .options { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-2);
    border: 2px solid transparent;
    color: var(--text);
    text-align: left;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: transform .05s, background .15s, border-color .15s;
    font-family: inherit;
    line-height: 1.4;
  }
  .option:hover:not(:disabled) { background: #334158; }
  .option:active:not(:disabled) { transform: translateY(1px); }
  .option .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: rgba(255,255,255,.08);
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option.selected { background: rgba(96,165,250,.10); border-color: var(--accent); }
  .option.selected .key { background: var(--accent); color: #0b1220; }
  .option.correct { background: rgba(34,197,94,.15); border-color: var(--good); }
  .option.correct .key { background: var(--good); color: #052e16; }
  .option.wrong { background: rgba(239,68,68,.15); border-color: var(--bad); }
  .option.wrong .key { background: var(--bad); color: #450a0a; }
  .option:disabled { cursor: default; }

  /* Sentence-completion blank: empty by default, fills with the currently
     selected word as a preview (italic + accent) until the user submits. */
  .sentence .blank.filled {
    color: var(--accent);
    font-weight: 700;
    font-style: italic;
    padding: 0 6px;
    min-width: 0;
  }
  .sentence .blank.committed {
    font-style: normal;
  }

  .feedback {
    margin-top: 22px;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .feedback .verdict { font-weight: 700; font-size: 18px; }
  .feedback.good .verdict { color: var(--good); }
  .feedback.bad .verdict { color: var(--bad); }
  .feedback .explanation { color: var(--muted); font-size: 16px; line-height: 1.55; }
  .feedback .explanation b { color: var(--text); font-weight: 600; }
  .feedback .streak-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    color: var(--muted);
    margin-top: 4px;
  }
  .feedback .streak-line .pip {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
  }
  .feedback .streak-line .pip.filled { background: var(--good); border-color: var(--good); }
  .feedback .mastered-banner {
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(34,197,94,.15);
    border: 1px solid var(--good);
    border-radius: 8px;
    color: var(--good);
    font-weight: 700;
    font-size: 16px;
    animation: poppyIn .35s ease-out;
  }
  @keyframes poppyIn {
    0% { transform: scale(.92); opacity: 0; }
    60% { transform: scale(1.03); opacity: 1; }
    100% { transform: scale(1); }
  }

  .actions {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .actions .left { display: flex; gap: 8px; }
  .actions .right { display: flex; gap: 8px; }
  button.primary {
    background: var(--accent);
    color: #0b1220;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
    transition: transform .05s, filter .15s;
    font-family: inherit;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  button.ghost:hover { background: rgba(255,255,255,.04); color: var(--text); }
  button.success {
    background: var(--good);
    color: #052e16;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button.success:hover { filter: brightness(1.05); }

  .footer-hint {
    width: min(820px, 100%);
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
  }
  .kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: rgba(255,255,255,.06);
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 13px;
  }

  /* ─── Results view ─── */
  .view-results { width: min(820px, 100%); }
  .results-summary {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 28px;
    text-align: center;
    margin-bottom: 16px;
  }
  .results-summary .big {
    font-size: 48px;
    font-weight: 800;
    color: var(--text);
    margin: 6px 0;
  }
  .results-summary .big.good { color: var(--good); }
  .results-summary .big.ok { color: var(--warn); }
  .results-summary .big.bad { color: var(--bad); }
  .results-summary .sub { color: var(--muted); font-size: 16px; }
  .results-summary .row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 18px;
    font-size: 15px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .results-summary .row strong { color: var(--text); font-size: 18px; display: block; margin-bottom: 2px; }
  .results-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 16px 0 22px;
    flex-wrap: wrap;
  }
  .review-list { display: flex; flex-direction: column; gap: 8px; }
  .review-item {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-left: 3px solid var(--good);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 16px;
  }
  .review-item.wrong { border-left-color: var(--bad); }
  .review-item.skipped { border-left-color: var(--muted); }
  .review-item.mastered { border-left-color: var(--good); }
  .review-item .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }
  .review-item .qword {
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text);
    word-break: break-word;
  }
  .review-item .mark { font-size: 14px; color: var(--muted); white-space: nowrap; }
  .review-item .mark.good { color: var(--good); }
  .review-item .mark.bad { color: var(--bad); }
  .review-item .detail { color: var(--muted); font-size: 15px; line-height: 1.55; }
  .review-item .detail b { color: var(--text); }
  .review-item .section-tag {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--accent);
    background: rgba(96,165,250,.12);
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
  }

  /* ─── Essay view ─── */
  .view-essay { width: min(820px, 100%); }
  .essay-prompt {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 18px 22px;
    font-size: 17px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
  }
  .essay-prompt .label {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .5px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .essay-textarea {
    width: 100%;
    min-height: 50vh;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 16px 18px;
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16.5px;
    line-height: 1.65;
    resize: vertical;
  }
  .essay-textarea:focus { outline: none; border-color: var(--accent); }
  .essay-meta {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    padding: 0 4px;
  }
  .essay-meta .word-count { font-weight: 700; color: var(--text); }
  .essay-final {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 20px 24px;
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }
</style>
</head>
<body>

<header class="app">
  <h1>Custom Test Practicer 9000</h1>
  <button class="back hidden" id="backBtn">← Home</button>
</header>

<!-- ─── HOME VIEW ─── -->
<div class="view-home" id="viewHome">
  <div class="grade-toggle">
    <button class="grade-pill" id="gradeLower">
      <div class="label">Lower Level</div>
      <div class="sub">Grades 4 → 5</div>
    </button>
    <button class="grade-pill" id="gradeBridge">
      <div class="label">Bridge Level</div>
      <div class="sub">Grade 5 → 6</div>
    </button>
    <button class="grade-pill active" id="gradeMiddle">
      <div class="label">Middle Level</div>
      <div class="sub">Grades 6 → 7</div>
    </button>
  </div>

  <div class="mode-toggle" role="tablist">
    <button id="modePractice" class="active" role="tab">Practice Mode</button>
    <button id="modeTest" role="tab">Test Mode</button>
  </div>
  <div class="mode-desc" id="modeDesc"></div>

  <div class="review-panel hidden" id="reviewPanel">
    <div class="info">

    { id: "lp2", title: "Octopus Brains", genre: "nonfiction", text: `Most animals keep their thinking inside their head. Octopuses do things differently. An octopus has nine brains in all. One large brain sits between its eyes, and eight smaller brains run down its arms, one for each arm.

Arch bridges are stronger. The curved arch underneath pushes the weight of the bridge outward to the ground on both sides. The Romans built stone arch bridges over two thousand years ago, and some are still standing today.

    { id: "p1", title: "The Compass in the Cookie Tin", genre: "fiction", text: `Mara had been digging in her grandmother's attic for almost an hour when her fingers brushed against something cold and round. She pulled a rusted cookie tin from beneath a stack of yellowing newspapers. The lid was stuck, painted shut by decades of damp summers, and it took both her thumbs and a butter knife to pry it loose.

Inside was no cookie. A brass compass, scratched but still gleaming faintly, sat on a square of folded paper. Mara lifted it carefully. The needle quivered, then settled, pointing not north but slightly east of it, as if confused. She frowned. Compasses were supposed to be certain things.

The folded paper turned out to be a map drawn in pencil, the lines so faint she had to angle it toward the dusty window. It showed her grandmother's backyard, the old oak, the shed, and a small X scratched between them. Beside the X, in handwriting Mara almost recognized from birthday cards, were the words: For when you are brave enough.

Mara sat back on her heels. Her grandmother had passed two months ago, and the family had been clearing the house in tired, polite shifts. No one had mentioned a compass. No one had mentioned a map. The discovery felt private, as though her grandmother had tucked it away knowing exactly who would find it.

    { id: "p2", title: "The Glass Frogs of the Cloud Forest", genre: "nonfiction", text: `High in the misty mountains of Central and South America, an unusual amphibian clings to leaves above rushing streams. The glass frog, no larger than a thumbnail, gets its name from a remarkable feature: the skin on its belly is almost completely transparent. If you flip one over (gently, as biologists do), you can see its tiny heart beating, the loops of its intestines, and the pale outlines of its bones.

Scientists long wondered why this transparency exists. A see-through belly does not help a frog blend in with green leaves. The answer turned out to be cleverer than simple camouflage. When a glass frog rests on a leaf during the day, light passing through its body softens the edges of its silhouette. To a hungry bird looking up from below, the frog looks less like a sharp frog-shape and more like a slightly darker patch of leaf. The trick is called edge diffusion, and it works best because the frog's organs are tucked into a tight, central bundle.

Even more surprising, glass frogs perform a kind of magic with their blood. When they sleep, they pull most of their red blood cells into a hidden pouch near their liver. With the red removed, their bodies become even more transparent. Almost no other animal can hide its own blood and survive.

Glass frogs live only in cool, humid forests, often near waterfalls where the air stays damp. Sadly, these forests are shrinking as land is cleared for farming and roads. Some species have already vanished from places where they were common a generation ago. Researchers continue to climb into the cloud forests, headlamps glowing in the mist, hoping to learn more about the glass frog before its quiet world disappears.` },
    { id: "p3", title: "Bessie Coleman Reaches for the Sky", genre: "biography", text: `Bessie Coleman grew up picking cotton in Texas in the early 1900s, but her imagination was never confined to the fields. She read every book she could borrow and listened, wide-eyed, to her older brother's stories from France during the First World War. He teased her once that French women could fly airplanes, while Black women in America could not. Bessie decided, quietly, to prove him wrong.

Seven months later, she returned home as the first Black woman in the world to earn an international pilot's license. American newspapers, which had ignored her departure, suddenly noticed. Bessie became a celebrity at air shows, performing loops and dives that made crowds gasp. She refused, however, to perform at any show that would not admit Black spectators. If audiences wanted to see "Queen Bess" fly, they had to let everyone watch.

She dreamed of opening a flight school of her own so that other young Black Americans could learn to fly without crossing an ocean. Tragically, she died in a crash in 1926 before that dream could be built. But her example outlived her. Pilots she had inspired went on to train at the school she could not finish, and decades later, the first Black military pilots in the United States cited her name when asked who taught them to believe the sky was theirs.` },
    { id: "p4", title: "How a Geyser Builds Its Show", genre: "informational", text: `A geyser looks, from a distance, like a fountain that turns itself on. Steam rolls upward, water bursts skyward, and minutes later the whole spectacle settles back into a steaming pool. Underneath, though, a geyser is really a kind of natural plumbing problem, and understanding it begins with the rocks.

Geysers form only in rare places where three ingredients meet. First, there must be a heat source, usually magma not far below the surface. Second, there must be groundwater that can seep down into cracks and chambers in the rock. Third, the underground channels must be narrow and twisted, with constrictions that trap rising water instead of letting it flow freely upward.

Here is how the show is built. Cold water trickles down into a deep chamber and is heated by the surrounding rock. Because the column of water above it is heavy, the water at the bottom cannot boil at the usual temperature; the pressure raises its boiling point. Heat continues to build. Eventually, a small amount of water near the top begins to bubble and overflow. That overflow reduces the weight pressing down. The pressure drops, the superheated water below suddenly flashes into steam, and the steam shoves everything above it out of the ground in a roaring jet.

After the eruption, the chamber is mostly empty. Groundwater begins seeping in again. Heating resumes. The cycle restarts, sometimes within minutes, sometimes over many hours. Old Faithful in Yellowstone is famous because its plumbing is unusually regular, but most geysers are moody and unpredictable.

There are fewer than a thousand active geysers on the planet. They are fragile, too: anything that clogs the underground channels, from earthquakes to tossed coins, can silence a geyser forever.` },
    { id: "p5", title: "The Last Train to Marrowfield", genre: "fiction", text: `Devon pressed her forehead against the cold window of the train and watched the prairie slide past in long brown ribbons. Her older brother Caleb sat across from her, pretending to read a magazine, but she could tell he was just turning pages without looking at them.

"It won't be like before," he said finally, without raising his eyes. "You should know that."

The conductor passed through the car, punching tickets. He paused at their seats and tipped his cap. "First time on the Westbound?" he asked.

"No, sir," Devon said. "But it's been a while."

He smiled and moved on. Devon noticed Caleb watching her, and for a second his face looked exactly like their father's — the same crooked half-smile, the same small crease between the eyebrows. She looked away quickly, suddenly embarrassed, though she could not have said why.

Outside, the light was beginning to thicken into evening. A line of grain elevators rose on the horizon like pale teeth. Devon counted them under her breath: one, two, three, four. When she was small, she had believed that counting them brought good luck. She had not done it in years.

"Caleb," she said.

"Hmm?"

"Do you think Aunt Lila will recognize us?"

He laughed, surprised. "Of course she will. We're not strangers."

    { id: "p6", title: "The Lost Library of Timbuktu", genre: "nonfiction", text: `For most of the twentieth century, scholars believed that sub-Saharan Africa had produced little in the way of written history. They were spectacularly wrong. Hidden in the houses, courtyards, and underground chambers of Timbuktu — a small city in the West African nation of Mali — lay one of the great treasures of the written word: hundreds of thousands of handwritten manuscripts, some dating back more than seven hundred years.

Timbuktu was once a wealthy crossroads of trade, where caravans carrying salt from the Sahara met traders bringing gold from the southern forests. By the 1400s, the city was also a center of learning. Its three great mosques served as universities, and scholars came from as far away as Spain and Egypt to study astronomy, medicine, mathematics, and Islamic law. They wrote on paper imported from Italy, copying texts in elegant Arabic script and binding the pages in leather covers stamped with intricate patterns.

When the city's fortunes declined in the seventeenth century, the manuscripts did not disappear. Instead, the families of Timbuktu hid them. Some were buried in iron trunks. Others were sealed inside the walls of homes or carried out into the desert and stored in caves. For generations, sons and daughters guarded the collections their ancestors had assembled, often without reading them.

In 2012, the manuscripts faced their greatest danger. An armed group seized Timbuktu and threatened to destroy the texts, which they considered offensive. Working in secret, librarians and ordinary citizens smuggled nearly 350,000 manuscripts out of the city, hiding them in rice sacks and floating them down the Niger River in small boats. Almost all of them survived.

Today, researchers in Mali and around the world are slowly translating and digitizing the manuscripts. Each page they decipher rewrites a piece of history that was never truly lost — only waiting for someone to listen.` },
    { id: "p7", title: "Why a Curveball Curves", genre: "informational", text: `A good curveball can be one of the most baffling sights in baseball. The ball leaves the pitcher's hand traveling toward the center of the plate, and then — somehow — it dives sideways or drops sharply just before the batter swings. For more than a century, players and fans argued about whether the curve was real or simply an optical illusion. Today, physicists can explain exactly how it works.

The secret lies in spin. When a pitcher throws a curveball, the fingers snap downward at the moment of release, giving the ball a fast forward rotation. As the ball spins through the air, the seams catch the surrounding air molecules and drag a thin layer of air around with them. On one side of the ball, this dragged air moves in the same direction as the wind rushing past; on the other side, it moves against it.

This difference creates uneven air pressure. The side where the dragged air moves with the wind has lower pressure, and the side where it moves against the wind has higher pressure. The ball is pushed from the high-pressure side toward the low-pressure side. Scientists call this the Magnus effect, named for the German physicist Heinrich Magnus, who studied it in the 1850s — long before baseball became popular.

The amount of curve depends on several factors: how fast the ball spins, how fast it travels, and even the weather. Humid air is actually less dense than dry air, which slightly reduces the Magnus effect. That is one reason curveballs behave differently in Denver, where the thin mountain air gives the seams less to grip.

So the next time you see a batter swing wildly at a pitch that seemed to bend in midair, remember: the ball is not playing tricks. It is obeying the same physical laws that move airplanes, soccer balls, and even spinning rockets through the sky.` }

      text: `When the sun goes down, most flowers close their petals and rest. But a small group of plants does the opposite. These night-blooming flowers wait until darkness falls, then open wide to greet a very different crowd of visitors.

// REGISTRIES — global lookups built at boot for all grades
// ════════════════════════════════════════════════════════════════════════════
const QUESTION_REGISTRY = {};   // id (with grade prefix) → { entry, sectionKey, gradeLevel }
const PASSAGE_LOOKUP = {};      // passage id (e.g. "p1", "lp1") → passage object

function entryId(gradeLevel, sectionKey, idx) {
  return `${gradeLevel}-${sectionKey}-${idx}`;
}

function buildRegistries() {
  for (const gradeKey of Object.keys(GRADES)) {
    const g = GRADES[gradeKey];
    for (const section of SECTIONS) {
      if (section.isEssay) continue;
      const pool = section.isReading ? g.pools.reading.questions : g.pools[section.poolKey];
      pool.forEach((entry, idx) => {
        const id = entryId(gradeKey, section.key, idx);
        QUESTION_REGISTRY[id] = { entry, sectionKey: section.key, gradeLevel: gradeKey };
      });
    }
    g.pools.reading.passages.forEach(p => { PASSAGE_LOOKUP[p.id] = p; });
  }
}

// Shortcut accessor for current grade's lifetime stats
function L() { return state.lifetimes[state.gradeLevel]; }

function poolFor(section) {
  if (!section) return [];
  if (section.isEssay) return currentGrade().pools.essays;
  if (section.isReading) return currentGrade().pools.reading.questions;

// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function $(id) { return document.getElementById(id); }
function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}
function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Convert ASCII fractions ("3/4") and Unicode fraction chars (½, ⅗, etc.) into
// stacked HTML fractions like standardized tests print. Handles mixed numbers
// ("3¼" → "3" + stacked "1/4"). Skips dates and paths (no digits adjacent
// to the slash on either side beyond the immediate numerator/denominator).
const UNICODE_FRAC_MAP = {
  "½":"1/2","⅓":"1/3","⅔":"2/3","¼":"1/4","¾":"3/4",
  "⅕":"1/5","⅖":"2/5","⅗":"3/5","⅘":"4/5",
  "⅙":"1/6","⅚":"5/6","⅐":"1/7","⅛":"1/8","⅜":"3/8","⅝":"5/8","⅞":"7/8",
  "⅑":"1/9","⅒":"1/10",
};
function fmtFractions(text) {
  if (text == null) return "";
  let t = String(text);
  // Unicode fractions: if attached to a digit ("3½"), insert a space so it
  // reads as a mixed number; then convert all Unicode fracs to "X/Y" form.
  for (const [u, asc] of Object.entries(UNICODE_FRAC_MAP)) {
    t = t.replace(new RegExp("(\\d)" + u, "g"), "$1 " + asc);
    t = t.split(u).join(asc);
  }
  // Stack ASCII "X/Y" into <span class="frac">. Lookbehind/lookahead avoid
  // matching dates like 12/25/2024 or URL paths.
  t = t.replace(/(?<![\d\/])(\d+)\/(\d+)(?![\d\/])/g,
    '<span class="frac"><span class="num">$1</span><span class="den">$2</span></span>');
  return t;
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.gradeLevel && GRADES[data.gradeLevel]) state.gradeLevel = data.gradeLevel;
    if (data.lifetimes) {
      for (const k of Object.keys(state.lifetimes)) {
        if (data.lifetimes[k]) {
          Object.assign(state.lifetimes[k], data.lifetimes[k]);
          if (!state.lifetimes[k].mistakes) state.lifetimes[k].mistakes = {};
        }
      }
    }
  } catch (_) {}
}
function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      gradeLevel: state.gradeLevel,
      lifetimes: state.lifetimes,
    }));
  } catch (_) {}
}

// ════════════════════════════════════════════════════════════════════════════
// QUESTION FACTORY
// ════════════════════════════════════════════════════════════════════════════
const QC_CHOICES = [
  "The quantity in Column A is greater",
  "The quantity in Column B is greater",
  "The two quantities are equal",
  "The relationship cannot be determined",
];
const QC_ANSWER_MAP = { a: 0, b: 1, equal: 2, cant: 3 };

function makeQuestion(entry, sectionKey, idx, gradeLevel = state.gradeLevel) {
  const id = entryId(gradeLevel, sectionKey, idx);

  if (entry.type === "quantComparison") {
    return {
      id, sectionKey, entry,
      promptHtml: `<div class="prompt">Using the information given, compare the quantity in Column A to the quantity in Column B.</div>
        <div class="qc-cols">
          <div class="qc-col"><div class="qc-label">Column A</div><div class="qc-val">${fmtFractions(entry.columnA)}</div></div>
          <div class="qc-col"><div class="qc-label">Column B</div><div class="qc-val">${fmtFractions(entry.columnB)}</div></div>
        </div>`,
      choices: QC_CHOICES.slice(),
      answerIdx: QC_ANSWER_MAP[entry.answer],
      feedbackHtml: `<b>Explanation:</b> ${fmtFractions(entry.explanation)}`,
      displayLabel: `Column A: ${entry.columnA}  vs  Column B: ${entry.columnB}`,
    };
  }
  if (entry.passageId !== undefined) {
    return {
      id, sectionKey, entry,
      promptHtml: `<div class="question-text">${entry.question}</div>`,
      choices: entry.choices.slice(),
      answerIdx: entry.correct,
      feedbackHtml: `<b>Explanation:</b> ${entry.explanation}`,
      passageId: entry.passageId,
      displayLabel: entry.question,
    };
  }
  if (entry.type === "math") {
    const choices = shuffle([entry.correct, ...entry.wrong]);
    return {
      id, sectionKey, entry,
      promptHtml: `<div class="prompt">Select the best answer from the choices given.</div><div class="math-q">${fmtFractions(entry.question)}</div>`,
      choices,
      answerIdx: choices.indexOf(entry.correct),
      feedbackHtml: `<b>Explanation:</b> ${fmtFractions(entry.explanation)}`,
      displayLabel: entry.question,
    };
  }
  if (entry.sentence) {
    const choices = shuffle([entry.correct, ...entry.wrong]);
    const sentenceHtml = escapeHtml(entry.sentence).replace(/_{3,}/, `<span class="blank" data-blank></span>`);
    return {
      id, sectionKey, entry,
      promptHtml: `<div class="prompt">Select the word that, when inserted in the sentence, best fits the meaning of the sentence as a whole.</div>
                   <div class="sentence">${sentenceHtml}</div>`,
      choices,
      answerIdx: choices.indexOf(entry.correct),
      feedbackHtml: `Correct word: <b>${entry.correct}</b>. ${fmtFractions(entry.explanation)}`,
      displayLabel: entry.sentence,
    };
  }
  // synonym
  const choices = shuffle([entry.correct, ...entry.wrong]);
  return {
    id, sectionKey, entry,
    promptHtml: `<div class="prompt">Select the word whose meaning is closest to the word in capital letters.</div>
                 <div class="word">${escapeHtml(entry.word).toUpperCase()}</div>`,
    choices,
    answerIdx: choices.indexOf(entry.correct),
    feedbackHtml: `<b>${entry.word}</b> — ${fmtFractions(entry.meaning)}.`,
    displayLabel: entry.word,
  };
}

function renderChoiceText(choice) {
  return fmtFractions(escapeHtml(choice).replace(/-/g, " "));
}

// Two-step submit helpers ─────────────────────────────────────────
function currentQuestion() {
  return state.mode === "test"   ? state.testCurrent
       : state.mode === "review" ? state.reviewCurrent
       :                           state.practiceCurrent;
}
function isAnswered() {
  return (state.mode === "practice" && state.practiceAnswered) ||
         (state.mode === "review"   && state.reviewAnswered);
}
function selectOption(i) {
  const q = currentQuestion();
  if (!q) return;
  if (i < 0 || i >= q.choices.length) return;
  if (isAnswered()) return;          // can't change after feedback shown
  state.selectedIdx = i;
  renderQuiz();
}
function submitSelected() {
  if (state.selectedIdx < 0) return;
  if (isAnswered()) return;
  const i = state.selectedIdx;
  if (state.mode === "test")        testAnswer(i);
  else if (state.mode === "review") reviewAnswer(i);
  else                              practiceAnswer(i);
}
function nextOrSubmit() {
  // Enter/Space and the right-hand button both call this — they "submit" if
  // a selection is pending, or "advance to next" if feedback is already shown.
  if (isAnswered()) {
    if (state.mode === "practice") practiceNext();
    else if (state.mode === "review") reviewAdvance();
  } else {
    submitSelected();
  }
}

// ════════════════════════════════════════════════════════════════════════════
// MISTAKE TRACKING (scoped to current grade)
// ════════════════════════════════════════════════════════════════════════════
function recordMistake(id, sectionKey, displayLabel) {
  const mistakes = L().mistakes;
  const m = mistakes[id] || {
    sectionKey, displayLabel,
    timesWrong: 0, timesRight: 0, correctStreak: 0,
    mastered: false, lastWrong: 0, lastRight: 0,
  };
  m.sectionKey = sectionKey;
  m.displayLabel = displayLabel;
  m.timesWrong += 1;
  m.correctStreak = 0;
  m.mastered = false;
  m.lastWrong = Date.now();
  mistakes[id] = m;
  saveProgress();
}
function recordReviewCorrect(id) {
  const m = L().mistakes[id];
  if (!m) return null;
  m.timesRight += 1;
  m.correctStreak += 1;
  m.lastRight = Date.now();
  if (m.correctStreak >= MASTERY_THRESHOLD) m.mastered = true;
  saveProgress();
  return m;
}
function mistakeStats() {
  let active = 0, mastered = 0;
  for (const v of Object.values(L().mistakes)) {
    if (v.mastered) mastered += 1;
    else active += 1;
  }
  return { active, mastered, total: active + mastered };
}
function getActiveMistakeIds() {
  return Object.entries(L().mistakes)
    .filter(([id, v]) => !v.mastered && QUESTION_REGISTRY[id] && QUESTION_REGISTRY[id].gradeLevel === state.gradeLevel)
    .map(([id]) => id);
}

// ════════════════════════════════════════════════════════════════════════════
// HOME VIEW
// ════════════════════════════════════════════════════════════════════════════
function renderHome() {
  // Grade pills
  $("gradeLower").classList.toggle("active", state.gradeLevel === "lower");
  $("gradeBridge").classList.toggle("active", state.gradeLevel === "bridge");
  $("gradeMiddle").classList.toggle("active", state.gradeLevel === "middle");

  // Mode toggle
  $("modePractice").classList.toggle("active", state.mode !== "test");
  $("modeTest").classList.toggle("active", state.mode === "test");
  $("modeDesc").textContent = state.mode === "test"
    ? `Test mode (${currentGrade().label}): timed section that matches real test pacing. Feedback hidden until the end.`
    : `Practice mode (${currentGrade().label}): no timer, instant feedback. Missed questions come back to reinforce learning.`;

  // Review panel
  const stats = mistakeStats();
  const panel = $("reviewPanel");
  if (stats.total === 0) {
    panel.classList.add("hidden");
  } else {
    panel.classList.remove("hidden");
    $("reviewPanelMeta").innerHTML = stats.active > 0
      ? `<strong>${stats.active}</strong> active · <strong>${stats.mastered}</strong> mastered. Drill until each one sticks (${MASTERY_THRESHOLD} right in a row = mastered).`
      : `All <strong>${stats.mastered}</strong> mastered. Nice work!`;
    $("startReviewBtn").disabled = stats.active === 0;
  }

  // Sections grid
  const grid = $("sectionsGrid");
  grid.innerHTML = "";
  for (const section of SECTIONS) {
    const card = document.createElement("button");
    card.className = "section-card";
    const t = testConfigFor(section);
    const available = !!(t && (section.isEssay || poolFor(section).length > 0));
    card.disabled = !available;
    const metaLine = state.mode === "test"
      ? (section.isEssay ? `1 prompt · ${fmtTime(t.durationSec)}` : `${t.questionCount} questions · ${fmtTime(t.durationSec)}`)
      : `${section.parent}`;
    card.innerHTML = `
      <div class="badge ${available ? "" : "soon"}">${available ? "Ready" : "Coming soon"}</div>
      <div class="title">${section.name}</div>
      <div class="meta">${metaLine}<br/>${section.description}</div>
    `;
    if (available) card.addEventListener("click", () => startSection(section));
    grid.appendChild(card);
  }

  // Lifetime stats badge
  $("gradeBadgeStats").textContent = currentGrade().label;
  $("lifetimeScore").textContent = `${L().score} / ${L().total}`;
  $("lifetimeBest").textContent = `${L().best}`;
}

function startSection(section) {
  state.section = section;
  if (section.isEssay) startEssay();
  else if (state.mode === "test") startTest();
  else startPractice();
}

function setGrade(grade) {
  if (!GRADES[grade] || grade === state.gradeLevel) return;
  state.gradeLevel = grade;
  saveProgress();
  renderHome();
}

// ════════════════════════════════════════════════════════════════════════════
// PRACTICE MODE
// ════════════════════════════════════════════════════════════════════════════
function startPractice() {
  state.mode = "practice";
  const pool = poolFor(state.section);
  state.practicePool = shuffle(pool.map((_, i) => i));
  state.practiceCurrent = null;
  state.practiceAnswered = false;
  state.selectedIdx = -1;
  $("timer").classList.add("hidden");
  $("streakStat").classList.remove("hidden");
  $("skipBtn").classList.add("hidden");
  $("finishBtn").classList.add("hidden");
  $("masterBtn").classList.add("hidden");
  showView("quiz");
  practiceNext();
}

function practiceNext() {
  const pool = poolFor(state.section);
  if (state.practicePool.length === 0) state.practicePool = shuffle(pool.map((_, i) => i));
  const idx = state.practicePool.pop();
  state.practiceCurrent = makeQuestion(pool[idx], state.section.key, idx);
  state.practiceAnswered = false;
  state.selectedIdx = -1;
  renderQuiz();
}

function practiceAnswer(i) {
  if (state.practiceAnswered) return;
  state.practiceAnswered = true;
  L().total += 1;
  const q = state.practiceCurrent;
  const correct = i === q.answerIdx;
  if (correct) {
    L().score += 1;
    L().streak += 1;
    if (L().streak > L().best) L().best = L().streak;
  } else {
    L().streak = 0;
    recordMistake(q.id, q.sectionKey, q.displayLabel);
    const pool = poolFor(state.section);
    const wordIdx = pool.indexOf(q.entry);
    if (wordIdx >= 0) {
      const insertAt = Math.max(0, state.practicePool.length - 3 - Math.floor(Math.random() * 5));
      state.practicePool.splice(insertAt, 0, wordIdx);
    }
  }
  saveProgress();
  renderQuiz(i);
}

// ════════════════════════════════════════════════════════════════════════════
// TEST MODE
// ════════════════════════════════════════════════════════════════════════════
function startTest() {
  state.mode = "test";
  const section = state.section;
  const t = testConfigFor(section);

  let questions;
  if (section.isReading) {
    const reading = currentGrade().pools.reading;
    const passages = shuffle(reading.passages.slice());
    questions = [];
    for (const p of passages) {
      const passQs = reading.questions.filter(q => q.passageId === p.id);
      passQs.forEach(entry => {
        const realIdx = reading.questions.indexOf(entry);
        questions.push(makeQuestion(entry, section.key, realIdx));
      });
      if (questions.length >= t.questionCount) break;
    }
    questions = questions.slice(0, t.questionCount);
  } else {
    const pool = poolFor(section);
    const idxs = shuffle(pool.map((_, i) => i)).slice(0, t.questionCount);
    questions = idxs.map(i => makeQuestion(pool[i], section.key, i));
  }

  state.testQueue = questions;
  state.testAnswers = state.testQueue.map(q => ({
    id: q.id, sectionKey: q.sectionKey, displayLabel: q.displayLabel,
    choices: q.choices, correctIdx: q.answerIdx, feedbackHtml: q.feedbackHtml,
    picked: null, skipped: false, skipCount: 0,
  }));
  state.testOrder = state.testQueue.map((_, i) => i);
  state.testOrderPos = 0;
  state.testCurrent = state.testQueue[0];
  state.selectedIdx = -1;
  state.testStartMs = Date.now();
  state.testEndMs = state.testStartMs + t.durationSec * 1000;
  $("timer").classList.remove("hidden");
  $("streakStat").classList.add("hidden");
  $("skipBtn").classList.remove("hidden");
  $("finishBtn").classList.remove("hidden");
  $("masterBtn").classList.add("hidden");
  startTimer();
  showView("quiz");
  renderQuiz();
}

function startTimer() {
  stopTimer();
  tickTimer();
  state.timerInterval = setInterval(tickTimer, 250);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
}
function tickTimer() {
  const remainingMs = state.testEndMs - Date.now();
  const remainingSec = Math.max(0, remainingMs / 1000);
  const el = $("timer");
  el.textContent = fmtTime(remainingSec);
  el.classList.toggle("warn", remainingSec <= 60 && remainingSec > 15);
  el.classList.toggle("danger", remainingSec <= 15);
  if (remainingMs <= 0) finishTest();
}

function testAnswer(i) {
  const qIdx = state.testOrder[state.testOrderPos];
  state.testAnswers[qIdx].picked = i;
  state.testAnswers[qIdx].skipped = false;
  advanceTest();
}
function testSkip() {
  // First skip: push the question to the end of the queue for another chance.
  // Second skip on the same question: counts as a final skip (no recycle).
  const qIdx = state.testOrder[state.testOrderPos];
  const ans = state.testAnswers[qIdx];
  ans.skipCount = (ans.skipCount || 0) + 1;
  if (ans.skipCount < 2) {
    state.testOrder.push(qIdx);
    ans.skipped = false;       // not final yet — will revisit
  } else {
    ans.skipped = true;        // final skip
  }
  advanceTest();
}
function advanceTest() {
  state.selectedIdx = -1;
  state.testOrderPos += 1;
  if (state.testOrderPos >= state.testOrder.length) { finishTest(); return; }
  state.testCurrent = state.testQueue[state.testOrder[state.testOrderPos]];
  renderQuiz();
}
function finishTestEarly() {
  // Mark any unanswered questions as final skips, then finish.
  for (const ans of state.testAnswers) {
    if (ans.picked === null) ans.skipped = true;
  }
  finishTest();
}
function finishTest() {
  stopTimer();
  for (const a of state.testAnswers) {
    if (a.picked === null || a.picked !== a.correctIdx) {
      recordMistake(a.id, a.sectionKey, a.displayLabel);
    }
  }
  renderTestResults();
  showView("results");
}

// ════════════════════════════════════════════════════════════════════════════
// REVIEW MODE
// ════════════════════════════════════════════════════════════════════════════
function startReview() {
  const ids = getActiveMistakeIds();
  if (ids.length === 0) return;
  state.mode = "review";
  state.reviewQueue = shuffle(ids);
  state.reviewIdx = 0;
  state.reviewCurrent = null;
  state.reviewAnswered = false;
  state.reviewSession = { seen: 0, correct: 0, wrong: 0, mastered: 0 };
  state.selectedIdx = -1;
  $("timer").classList.add("hidden");
  $("streakStat").classList.add("hidden");
  $("skipBtn").classList.add("hidden");
  $("finishBtn").classList.add("hidden");
  $("masterBtn").classList.remove("hidden");
  showView("quiz");
  reviewNext();
}

function reviewNext() {
  while (state.reviewIdx < state.reviewQueue.length) {
    const id = state.reviewQueue[state.reviewIdx];
    const reg = QUESTION_REGISTRY[id];
    const meta = L().mistakes[id];
    if (reg && meta && !meta.mastered) {
      const g = GRADES[reg.gradeLevel];
      const section = SECTIONS.find(s => s.key === reg.sectionKey);
      const pool = section.isReading ? g.pools.reading.questions : g.pools[section.poolKey];
      const idx = pool.indexOf(reg.entry);
      state.reviewCurrent = makeQuestion(reg.entry, reg.sectionKey, idx, reg.gradeLevel);
      state.reviewAnswered = false;
      state.reviewJustMastered = false;
      state.selectedIdx = -1;
      renderQuiz();
      return;
    }
    state.reviewIdx += 1;
  }
  finishReview();
}

function reviewAnswer(i) {
  if (state.reviewAnswered) return;
  state.reviewAnswered = true;
  const q = state.reviewCurrent;
  const correct = i === q.answerIdx;
  state.reviewSession.seen += 1;
  if (correct) {
    const m = recordReviewCorrect(q.id);
    state.reviewSession.correct += 1;
    if (m && m.mastered) {
      state.reviewJustMastered = true;
      state.reviewSession.mastered += 1;
    }
  } else {
    recordMistake(q.id, q.sectionKey, q.displayLabel);
    state.reviewSession.wrong += 1;
  }
  renderQuiz(i);
}

function reviewMarkMastered() {
  if (!state.reviewCurrent) return;
  const id = state.reviewCurrent.id;
  const m = L().mistakes[id];
  if (m) {
    m.mastered = true;
    m.correctStreak = Math.max(m.correctStreak, MASTERY_THRESHOLD);
    saveProgress();
    state.reviewSession.mastered += 1;
  }
  state.reviewIdx += 1;
  reviewNext();
}
function reviewAdvance() { state.reviewIdx += 1; reviewNext(); }
function finishReview() { state.mode = "practice"; renderReviewResults(); showView("results"); }

// ════════════════════════════════════════════════════════════════════════════
// QUIZ RENDERING
// ════════════════════════════════════════════════════════════════════════════
function renderQuiz(picked = -1) {
  const mode = state.mode;
  const q = mode === "test"   ? state.testCurrent
          : mode === "review" ? state.reviewCurrent
          :                     state.practiceCurrent;
  if (!q) return;

  // Progress / streak
  if (mode === "test") {
    const total = state.testQueue.length;
    const answered = state.testAnswers.filter(a => a.picked !== null).length;
    const skippedFinal = state.testAnswers.filter(a => a.picked === null && a.skipped).length;
    const skippedHint = skippedFinal > 0 ? ` · ${skippedFinal} skipped` : "";
    $("progressLabel").textContent = `${answered} of ${total} answered${skippedHint}`;
    $("progressFill").style.width = `${(answered / total) * 100}%`;
  } else if (mode === "review") {
    const total = state.reviewQueue.length;
    const n = Math.min(state.reviewIdx + 1, total);
    $("progressLabel").textContent = `Reviewing ${n} of ${total}`;
    $("progressFill").style.width = `${(state.reviewIdx / total) * 100}%`;
  } else {
    $("progressLabel").textContent = `${currentGrade().label} · ${state.section.name} · Score ${L().score} / ${L().total}`;
    $("progressFill").style.width = `${L().total ? (L().score / L().total) * 100 : 0}%`;
    $("streak").textContent = `${L().streak}${L().best ? ` (best ${L().best})` : ""}`;
  }

  // Passage panel for reading
  if (q.passageId) {
    const p = PASSAGE_LOOKUP[q.passageId];
    if (p) {
      $("passagePanel").classList.remove("hidden");
      $("passageTitle").innerHTML = `${escapeHtml(p.title)} <span class="genre">· ${escapeHtml(p.genre)}</span>`;
      $("passageText").innerHTML = p.text.split(/\n\n+/).map(para => `<p>${escapeHtml(para)}</p>`).join("");
    }
  } else {
    $("passagePanel").classList.add("hidden");
  }

  $("promptBlock").innerHTML = q.promptHtml;

  const showFeedback = (mode === "practice" && state.practiceAnswered) ||
                       (mode === "review"   && state.reviewAnswered);

  // Fill the sentence-completion blank with the currently selected word as a preview.
  // After submission, also show the picked word but without italic style.
  const blankEl = $("promptBlock").querySelector("[data-blank]");
  if (blankEl) {
    let blankIdx = -1;
    if (showFeedback) blankIdx = picked >= 0 ? picked : state.selectedIdx;
    else blankIdx = state.selectedIdx;
    if (blankIdx >= 0 && blankIdx < q.choices.length) {
      blankEl.textContent = q.choices[blankIdx];
      blankEl.classList.add("filled");
      if (showFeedback) blankEl.classList.add("committed");
    }
  }

  const optsEl = $("options");
  optsEl.innerHTML = "";
  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.disabled = showFeedback;
    btn.innerHTML = `<span class="key">${"ABCD"[i]}</span><span>${renderChoiceText(choice)}</span>`;
    if (showFeedback) {
      if (i === q.answerIdx) btn.classList.add("correct");
      else if (i === picked) btn.classList.add("wrong");
    } else if (i === state.selectedIdx) {
      btn.classList.add("selected");
    }
    btn.addEventListener("click", () => selectOption(i));
    optsEl.appendChild(btn);
  });

  const fbEl = $("feedback");
  const nextBtn = $("nextBtn");
  const masterBtn = $("masterBtn");

  if (showFeedback) {
    const correct = picked === q.answerIdx;
    let html = `<div class="verdict">${correct ? "Correct!" : "Not quite."}</div>
                <div class="explanation">${q.feedbackHtml}</div>`;
    if (mode === "review") {
      const m = L().mistakes[q.id];
      const streak = m ? m.correctStreak : 0;
      const pips = Array.from({ length: MASTERY_THRESHOLD }, (_, i) =>
        `<span class="pip ${i < streak ? "filled" : ""}"></span>`
      ).join("");
      html += `<div class="streak-line">Mastery streak: ${pips} <span>(${Math.min(streak, MASTERY_THRESHOLD)} of ${MASTERY_THRESHOLD})</span></div>`;
      if (state.reviewJustMastered) {
        html += `<div class="mastered-banner">Mastered! This question will leave the review pool.</div>`;
      }
    }
    fbEl.className = `feedback ${correct ? "good" : "bad"}`;
    fbEl.innerHTML = html;
    nextBtn.disabled = false;
    nextBtn.classList.remove("hidden");
    nextBtn.textContent = "Next →";
    masterBtn.classList.toggle("hidden", mode !== "review");
    nextBtn.focus();
  } else {
    // Pre-submit state — button reads "Submit" and is enabled only when a
    // selection has been made.
    fbEl.className = "feedback";
    fbEl.innerHTML = "";
    nextBtn.classList.remove("hidden");
    nextBtn.textContent = "Submit";
    nextBtn.disabled = state.selectedIdx < 0;
    masterBtn.classList.add("hidden");
  }
}

// ════════════════════════════════════════════════════════════════════════════
// ESSAY MODE
// ════════════════════════════════════════════════════════════════════════════
function startEssay() {
  state.mode = state.mode === "test" ? "test" : "practice";
  const isTest = state.mode === "test";
  const pool = currentGrade().pools.essays;
  state.essay.prompt = pool[Math.floor(Math.random() * pool.length)];
  state.essay.text = "";
  state.essay.startMs = Date.now();
  state.essay.endMs = isTest ? Date.now() + testConfigFor(state.section).durationSec * 1000 : 0;
  state.essay.isTest = isTest;
  $("essayPromptText").textContent = state.essay.prompt;
  $("essayTextarea").value = "";
  $("essayMetaLeft").textContent = isTest ? `Test mode — 30 minute timer.` : `Practice mode — no timer.`;
  $("essayMetaRight").textContent = state.gradeLevel === "lower" ? `Aim for about a page.` : `Aim for 300–400 words.`;
  if (isTest) {
    $("essayTimer").classList.remove("hidden");
    startEssayTimer();
  } else {
    $("essayTimer").classList.add("hidden");
  }
  updateEssayWordCount();
  $("essayFinalWrapper").classList.add("hidden");
  showView("essay");
  setTimeout(() => $("essayTextarea").focus(), 50);
}

function startEssayTimer() { stopEssayTimer(); tickEssayTimer(); state.essay.timerInterval = setInterval(tickEssayTimer, 250); }
function stopEssayTimer() { if (state.essay.timerInterval) clearInterval(state.essay.timerInterval); state.essay.timerInterval = null; }
function tickEssayTimer() {
  if (!state.essay.isTest) return;
  const remainingMs = state.essay.endMs - Date.now();
  const remainingSec = Math.max(0, remainingMs / 1000);
  const el = $("essayTimer");
  el.textContent = fmtTime(remainingSec);
  el.classList.toggle("warn", remainingSec <= 120 && remainingSec > 30);
  el.classList.toggle("danger", remainingSec <= 30);
  if (remainingMs <= 0) finishEssay();
}
function countWords(text) { const t = text.trim(); return t ? t.split(/\s+/).length : 0; }
function updateEssayWordCount() {
  const n = countWords(state.essay.text);
  $("essayWordCount").textContent = `${n} word${n === 1 ? "" : "s"}`;
  $("essaySaveStatus").textContent = "Saved locally";
}
function finishEssay() {
  stopEssayTimer();
  const words = countWords(state.essay.text);
  const elapsed = Math.floor((Date.now() - state.essay.startMs) / 1000);
  const goal = state.gradeLevel === "lower" ? 150 : 300;
  $("resultLabel").textContent = "Essay complete";
  $("resultScore").textContent = `${words}`;
  $("resultScore").className = "big " + (words >= goal ? "good" : words >= goal * 0.66 ? "ok" : "bad");
  $("resultPct").textContent = `words written`;
  $("resultRow").innerHTML = `
    <div><strong>${words}</strong>words</div>
    <div><strong>${fmtTime(elapsed)}</strong>time used</div>
    ${state.essay.isTest ? `<div><strong>${fmtTime(testConfigFor(state.section).durationSec)}</strong>limit</div>` : ""}
  `;
  $("retryBtn").textContent = "New prompt";
  $("reviewList").innerHTML = "";
  $("essayFinalWrapper").classList.remove("hidden");
  $("essayFinal").textContent = state.essay.text || "(You didn't write anything yet.)";
  showView("results");
}

// ════════════════════════════════════════════════════════════════════════════
// RESULTS VIEWS
// ════════════════════════════════════════════════════════════════════════════
function renderTestResults() {
  const answers = state.testAnswers;
  let correct = 0, wrong = 0, skipped = 0;
  for (const a of answers) {
    if (a.picked === null) skipped += 1;
    else if (a.picked === a.correctIdx) correct += 1;
    else wrong += 1;
  }
  const total = answers.length;
  const pct = total ? Math.round((correct / total) * 100) : 0;
  const elapsed = Math.floor((Date.now() - state.testStartMs) / 1000);

  $("resultLabel").textContent = `${currentGrade().label} · ${state.section.name} — test complete`;
  $("resultScore").textContent = `${correct} / ${total}`;
  $("resultScore").className = "big " + (pct >= 80 ? "good" : pct >= 60 ? "ok" : "bad");
  $("resultPct").textContent = `${pct}%`;
  $("resultRow").innerHTML = `
    <div><strong>${correct}</strong>correct</div>
    <div><strong>${wrong}</strong>wrong</div>
    <div><strong>${skipped}</strong>skipped</div>
    <div><strong>${fmtTime(elapsed)}</strong>time used</div>
  `;
  $("retryBtn").textContent = "Try another test";
  $("essayFinalWrapper").classList.add("hidden");

  const list = $("reviewList");
  list.innerHTML = "";
  answers.forEach((a, i) => {
    const item = document.createElement("div");
    let cls = "good", label = "Correct";
    if (a.picked === null) { cls = "skipped"; label = "Skipped"; }
    else if (a.picked !== a.correctIdx) { cls = "wrong"; label = "Wrong"; }
    item.className = `review-item ${cls === "good" ? "" : cls}`;
    const yourAns = a.picked === null ? "—" : renderChoiceText(a.choices[a.picked]);
    const correctAns = renderChoiceText(a.choices[a.correctIdx]);
    item.innerHTML = `
      <div class="head">
        <div class="qword">${i + 1}. ${escapeHtml(a.displayLabel).slice(0, 120)}${a.displayLabel.length > 120 ? "…" : ""}</div>
        <div class="mark ${cls === "good" ? "good" : cls === "wrong" ? "bad" : ""}">${label}</div>
      </div>
      <div class="detail">
        Your answer: <b>${yourAns}</b> · Correct: <b>${correctAns}</b><br/>
        <span style="opacity:.85">${a.feedbackHtml}</span>
      </div>
    `;
    list.appendChild(item);
  });
}

function renderReviewResults() {
  const s = state.reviewSession;
  const stats = mistakeStats();
  $("resultLabel").textContent = `${currentGrade().label} · review session complete`;
  $("resultScore").textContent = `${s.correct} / ${s.seen}`;
  $("resultScore").className = "big " + (s.seen === 0 ? "ok" : (s.correct / s.seen >= 0.8 ? "good" : (s.correct / s.seen >= 0.5 ? "ok" : "bad")));
  $("resultPct").textContent = s.mastered > 0
    ? `Mastered ${s.mastered} item${s.mastered === 1 ? "" : "s"} this session`
    : "Keep going — mastery takes a few correct in a row";
  $("resultRow").innerHTML = `
    <div><strong>${s.correct}</strong>correct</div>
    <div><strong>${s.wrong}</strong>wrong</div>
    <div><strong>${s.mastered}</strong>mastered</div>
    <div><strong>${stats.active}</strong>still to learn</div>
  `;
  $("retryBtn").textContent = stats.active > 0 ? "Keep reviewing" : "Back to home";
  $("essayFinalWrapper").classList.add("hidden");
  $("reviewList").innerHTML = "";
}

// ════════════════════════════════════════════════════════════════════════════
// MISTAKES LIST VIEW
// ════════════════════════════════════════════════════════════════════════════
function renderMistakesList() {
  const stats = mistakeStats();
  $("mistakesGradeLabel").textContent = `Mistakes — ${currentGrade().label}`;
  $("mistakesCount").textContent = stats.total;
  $("mistakesActive").textContent = stats.active;
  $("mistakesMastered").textContent = stats.mastered;
  $("drillFromListBtn").disabled = stats.active === 0;

  const list = $("mistakesList");
  list.innerHTML = "";
  const entries = Object.entries(L().mistakes)
    .filter(([id]) => QUESTION_REGISTRY[id] && QUESTION_REGISTRY[id].gradeLevel === state.gradeLevel)
    .sort((a, b) => {
      if (a[1].mastered !== b[1].mastered) return a[1].mastered ? 1 : -1;
      return b[1].timesWrong - a[1].timesWrong;
    });
  if (entries.length === 0) {
    list.innerHTML = `<div class="review-item"><div class="detail">No mistakes yet at this grade level. Get some questions wrong and they'll show up here.</div></div>`;
    return;
  }
  for (const [id, m] of entries) {
    const section = SECTIONS.find(s => s.key === m.sectionKey);
    const cls = m.mastered ? "mastered" : "wrong";
    const label = m.mastered ? "Mastered" : `Streak ${m.correctStreak}/${MASTERY_THRESHOLD}`;
    const item = document.createElement("div");
    item.className = `review-item ${cls}`;
    item.innerHTML = `
      <div class="head">
        <div class="qword"><span class="section-tag">${section ? section.parent : ""}</span>${escapeHtml(m.displayLabel).slice(0, 140)}${m.displayLabel.length > 140 ? "…" : ""}</div>
        <div class="mark ${m.mastered ? "good" : "bad"}">${label}</div>
      </div>
      <div class="detail">
        <span style="opacity:.7">Wrong ${m.timesWrong}× · Right ${m.timesRight}×</span>
        ${m.mastered ? ` · <button class="ghost" data-unmaster="${escapeHtml(id)}" style="padding:2px 8px;font-size:11px">Reset</button>` : ""}
      </div>
    `;
    list.appendChild(item);
  }
  list.querySelectorAll("[data-unmaster]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-unmaster");
      const m = L().mistakes[id];
      if (m) { m.mastered = false; m.correctStreak = 0; saveProgress(); }
      renderMistakesList();
    });
  });
}

// ════════════════════════════════════════════════════════════════════════════
// EVENT WIRING
// ════════════════════════════════════════════════════════════════════════════
$("gradeLower").addEventListener("click", () => setGrade("lower"));
$("gradeBridge").addEventListener("click", () => setGrade("bridge"));
$("gradeMiddle").addEventListener("click", () => setGrade("middle"));

$("modePractice").addEventListener("click", () => { state.mode = "practice"; renderHome(); });
$("modeTest").addEventListener("click", () => { state.mode = "test"; renderHome(); });

$("nextBtn").addEventListener("click", nextOrSubmit);
$("skipBtn").addEventListener("click", () => { if (state.mode === "test") testSkip(); });
$("finishBtn").addEventListener("click", () => {
  if (state.mode !== "test") return;
  const unanswered = state.testAnswers.filter(a => a.picked === null).length;
  const msg = unanswered > 0
    ? `Finish test now? ${unanswered} unanswered question${unanswered === 1 ? "" : "s"} will be counted as skipped.`
    : "Finish test now?";
  if (confirm(msg)) finishTestEarly();
});
$("masterBtn").addEventListener("click", () => { if (state.mode === "review") reviewMarkMastered(); });

$("startReviewBtn").addEventListener("click", startReview);
$("viewMistakesBtn").addEventListener("click", () => { renderMistakesList(); showView("mistakes"); });
$("drillFromListBtn").addEventListener("click", startReview);
$("mistakesHomeBtn").addEventListener("click", () => { renderHome(); showView("home"); });

$("backBtn").addEventListener("click", () => {
  if (state.mode === "test" && (state.view === "quiz" || state.view === "essay")) {
    if (!confirm("Leave this timed test? Your progress will be lost.")) return;
  }
  stopTimer();
  stopEssayTimer();
  state.mode = state.mode === "review" ? "practice" : state.mode;
  renderHome();
  showView("home");
});
$("retryBtn").addEventListener("click", () => {
  if (state.section && state.section.isEssay) startEssay();
  else if (state.testAnswers.length && state.section) startTest();
  else if (mistakeStats().active > 0) startReview();
  else { renderHome(); showView("home"); }
});
$("homeBtn").addEventListener("click", () => { stopTimer(); stopEssayTimer(); renderHome(); showView("home"); });
$("resetProgress").addEventListener("click", () => {
  if (!confirm(`Reset all progress for ${currentGrade().label}? (Other grade level is unaffected.) This can't be undone.`)) return;
  state.lifetimes[state.gradeLevel] = { score: 0, total: 0, streak: 0, best: 0, mistakes: {} };
  saveProgress();
  renderHome();
});

// Essay
$("essayTextarea").addEventListener("input", (e) => {
  state.essay.text = e.target.value;
  updateEssayWordCount();
});
$("essayFinishBtn").addEventListener("click", () => {
  if (state.essay.isTest && !confirm("Finish your essay? You can't keep writing after this.")) return;
  finishEssay();
});
$("essayNewPromptBtn").addEventListener("click", () => {
  if (state.essay.text.trim() && !confirm("Switch prompts? You'll lose what you've written.")) return;
  startEssay();
});

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (document.activeElement && document.activeElement.tagName === "TEXTAREA") return;
  if (state.view !== "quiz") return;
  let pickIdx = -1;
  if (e.key >= "1" && e.key <= "4") pickIdx = parseInt(e.key, 10) - 1;
  else if (/^[a-dA-D]$/.test(e.key)) pickIdx = e.key.toUpperCase().charCodeAt(0) - 65;
  if (pickIdx >= 0) {
    selectOption(pickIdx);          // select-only; does NOT submit
  } else if (e.key === " " || e.key === "Enter") {
    e.preventDefault();
    nextOrSubmit();                  // submit if pending, otherwise advance
  } else if (e.key === "s" || e.key === "S") {
    if (state.mode === "test") testSkip();
  } else if (e.key === "m" || e.key === "M") {
    if (state.mode === "review" && state.reviewAnswered) reviewMarkMastered();
  }
});

// BOOT
buildRegistries();
loadProgress();
renderHome();
showView("home");
</script>
</body>
</html>
