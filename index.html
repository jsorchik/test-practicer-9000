<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custom Test Practicer 9000</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273549;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #60a5fa;
    --good: #22c55e;
    --bad: #ef4444;
    --warn: #f59e0b;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    /* Arial/Helvetica matches the standard online test interface and most
       published prep materials. Keep this generic so it feels like the real test. */
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(1200px 800px at 20% -10%, #1d2a4d 0%, transparent 60%),
                radial-gradient(900px 700px at 100% 110%, #1a3a3a 0%, transparent 60%),
                var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 64px;
    min-height: 100vh;
  }
  header.app {
    width: min(820px, 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }
  header.app h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: .5px;
    background: linear-gradient(90deg, #60a5fa, #22d3ee, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(96,165,250,.3);
  }
  header.app .back {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  header.app .back:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .hidden { display: none !important; }

  /* ─── Home view ─── */
  .view-home { width: min(820px, 100%); }

  /* Grade selector */
  .grade-toggle {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .grade-pill {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
    font-family: inherit;
  }
  .grade-pill:hover { background: var(--panel-2); }
  .grade-pill .label { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .grade-pill .sub { font-size: 14px; color: var(--muted); }
  .grade-pill.active {
    border-color: var(--accent);
    background: rgba(96,165,250,.10);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .grade-pill.active .label { color: var(--accent); }

  .mode-toggle {
    display: flex;
    background: var(--panel);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 18px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .mode-toggle button {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 12px 16px;
    border-radius: 9px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s;
    font-family: inherit;
  }
  .mode-toggle button.active {
    background: var(--panel-2);
    color: var(--text);
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .mode-desc {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .review-panel {
    background: var(--panel);
    border: 1px solid rgba(245,158,11,.3);
    border-left: 4px solid var(--warn);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .review-panel .info { flex: 1; min-width: 200px; }
  .review-panel .title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .review-panel .meta { font-size: 15px; color: var(--muted); }
  .review-panel .meta strong { color: var(--text); }
  .review-panel .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .sections {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .section-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 18px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: transform .05s, background .15s, border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: inherit;
  }
  .section-card:hover:not(:disabled) {
    background: var(--panel-2);
    border-color: rgba(96,165,250,.4);
  }
  .section-card:active:not(:disabled) { transform: translateY(1px); }
  .section-card:disabled { cursor: not-allowed; opacity: .5; }
  .section-card .title { font-size: 17px; font-weight: 700; color: var(--text); }
  .section-card .meta { font-size: 14px; color: var(--muted); line-height: 1.5; }
  .section-card .badge {
    align-self: flex-start;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(96,165,250,.15);
    color: var(--accent);
  }
  .section-card .badge.soon { background: rgba(148,163,184,.12); color: var(--muted); }

  .stats-summary {
    margin-top: 28px;
    padding: 16px 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    font-size: 15px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    align-items: center;
    justify-content: space-between;
  }
  .stats-summary strong { color: var(--text); font-weight: 700; }
  .stats-summary button {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ─── Quiz view ─── */
  .view-quiz { width: min(820px, 100%); }
  .quiz-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 16px;
    color: var(--muted);
    gap: 16px;
  }
  .quiz-bar .progress { flex: 1; min-width: 0; }
  .quiz-bar .progress-bar {
    height: 6px;
    background: rgba(255,255,255,.06);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
  }
  .quiz-bar .progress-bar > div {
    height: 100%;
    background: var(--accent);
    transition: width .25s ease;
  }
  .timer {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .timer.warn { color: var(--warn); border-color: var(--warn); }
  .timer.danger { color: var(--bad); border-color: var(--bad); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
  .stat-mini { font-size: 15px; flex-shrink: 0; }
  .stat-mini strong { color: var(--text); }

  .passage {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 14px;
    max-height: 45vh;
    overflow-y: auto;
    font-size: 17px;
    line-height: 1.6;
    color: var(--text);
  }
  .passage h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .5px;
  }
  .passage h3 .genre { color: var(--accent); font-weight: 600; }
  .passage p { margin: 0 0 12px; }
  .passage p:last-child { margin: 0; }

  .card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .prompt {
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 12px;
  }
  .word {
    text-align: center;
    font-weight: 800;
    letter-spacing: 2px;
    font-size: clamp(36px, 7vw, 56px);
    margin: 8px 0 28px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(96,165,250,.15);
  }
  .sentence {
    font-size: clamp(19px, 2.8vw, 22px);
    line-height: 1.6;
    text-align: center;
    margin: 12px 0 28px;
    color: var(--text);
    font-weight: 500;
    padding: 0 4px;
  }
  .sentence .blank {
    display: inline-block;
    min-width: 110px;
    height: 1.1em;
    border-bottom: 2px solid var(--accent);
    margin: 0 6px;
    vertical-align: -0.2em;
  }
  .math-q {
    font-size: clamp(22px, 3vw, 26px);
    font-weight: 600;
    text-align: center;
    margin: 12px 0 28px;
    color: var(--text);
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
    padding: 0 4px;
    white-space: pre-wrap;
  }

  /* Stacked fractions — matches what standardized tests use.
     vertical-align: middle puts the bar at the surrounding text's x-height,
     so "1 3/4" reads as a proper mixed number rather than a "1" floating
     above a dropped fraction. */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    font-size: 0.85em;
    line-height: 1.05;
    margin: 0 2px;
    font-variant-numeric: tabular-nums;
    /* nudge baseline-aligned neighbors (the whole number in a mixed number)
       up toward the fraction's middle so they don't sit too low */
    position: relative;
    top: -0.05em;
  }
  .frac .num {
    padding: 0 4px 1px;
    border-bottom: 1.5px solid currentColor;
    min-width: 0.7em;
    text-align: center;
  }
  .frac .den {
    padding: 1px 4px 0;
    min-width: 0.7em;
    text-align: center;
  }

  .question-text {
    font-size: clamp(17px, 2.5vw, 19px);
    line-height: 1.5;
    text-align: left;
    margin-bottom: 22px;
    color: var(--text);
    font-weight: 500;
  }
  .qc-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 18px 0 24px;
  }
  .qc-col {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }
  .qc-col .qc-label {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .qc-col .qc-val {
    font-size: clamp(20px, 2.8vw, 24px);
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .options { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-2);
    border: 2px solid transparent;
    color: var(--text);
    text-align: left;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: transform .05s, background .15s, border-color .15s;
    font-family: inherit;
    line-height: 1.4;
  }
  .option:hover:not(:disabled) { background: #334158; }
  .option:active:not(:disabled) { transform: translateY(1px); }
  .option .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: rgba(255,255,255,.08);
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option.selected { background: rgba(96,165,250,.10); border-color: var(--accent); }
  .option.selected .key { background: var(--accent); color: #0b1220; }
  .option.correct { background: rgba(34,197,94,.15); border-color: var(--good); }
  .option.correct .key { background: var(--good); color: #052e16; }
  .option.wrong { background: rgba(239,68,68,.15); border-color: var(--bad); }
  .option.wrong .key { background: var(--bad); color: #450a0a; }
  .option:disabled { cursor: default; }

  /* Sentence-completion blank: empty by default, fills with the currently
     selected word as a preview (italic + accent) until the user submits. */
  .sentence .blank.filled {
    color: var(--accent);
    font-weight: 700;
    font-style: italic;
    padding: 0 6px;
    min-width: 0;
  }
  .sentence .blank.committed {
    font-style: normal;
  }

  .feedback {
    margin-top: 22px;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .feedback .verdict { font-weight: 700; font-size: 18px; }
  .feedback.good .verdict { color: var(--good); }
  .feedback.bad .verdict { color: var(--bad); }
  .feedback .explanation { color: var(--muted); font-size: 16px; line-height: 1.55; }
  .feedback .explanation b { color: var(--text); font-weight: 600; }
  .feedback .streak-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    color: var(--muted);
    margin-top: 4px;
  }
  .feedback .streak-line .pip {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
  }
  .feedback .streak-line .pip.filled { background: var(--good); border-color: var(--good); }
  .feedback .mastered-banner {
    margin-top: 6px;
    padding: 8px 12px;
    background: rgba(34,197,94,.15);
    border: 1px solid var(--good);
    border-radius: 8px;
    color: var(--good);
    font-weight: 700;
    font-size: 16px;
    animation: poppyIn .35s ease-out;
  }
  @keyframes poppyIn {
    0% { transform: scale(.92); opacity: 0; }
    60% { transform: scale(1.03); opacity: 1; }
    100% { transform: scale(1); }
  }

  .actions {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .actions .left { display: flex; gap: 8px; }
  .actions .right { display: flex; gap: 8px; }
  button.primary {
    background: var(--accent);
    color: #0b1220;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
    transition: transform .05s, filter .15s;
    font-family: inherit;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,.08);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  button.ghost:hover { background: rgba(255,255,255,.04); color: var(--text); }
  button.success {
    background: var(--good);
    color: #052e16;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button.success:hover { filter: brightness(1.05); }

  .footer-hint {
    width: min(820px, 100%);
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
  }
  .kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: rgba(255,255,255,.06);
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 13px;
  }

  /* ─── Results view ─── */
  .view-results { width: min(820px, 100%); }
  .results-summary {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 28px;
    text-align: center;
    margin-bottom: 16px;
  }
  .results-summary .big {
    font-size: 48px;
    font-weight: 800;
    color: var(--text);
    margin: 6px 0;
  }
  .results-summary .big.good { color: var(--good); }
  .results-summary .big.ok { color: var(--warn); }
  .results-summary .big.bad { color: var(--bad); }
  .results-summary .sub { color: var(--muted); font-size: 16px; }
  .results-summary .row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 18px;
    font-size: 15px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .results-summary .row strong { color: var(--text); font-size: 18px; display: block; margin-bottom: 2px; }
  .results-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 16px 0 22px;
    flex-wrap: wrap;
  }
  .review-list { display: flex; flex-direction: column; gap: 8px; }
  .review-item {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-left: 3px solid var(--good);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 16px;
  }
  .review-item.wrong { border-left-color: var(--bad); }
  .review-item.skipped { border-left-color: var(--muted); }
  .review-item.mastered { border-left-color: var(--good); }
  .review-item .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }
  .review-item .qword {
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text);
    word-break: break-word;
  }
  .review-item .mark { font-size: 14px; color: var(--muted); white-space: nowrap; }
  .review-item .mark.good { color: var(--good); }
  .review-item .mark.bad { color: var(--bad); }
  .review-item .detail { color: var(--muted); font-size: 15px; line-height: 1.55; }
  .review-item .detail b { color: var(--text); }
  .review-item .section-tag {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--accent);
    background: rgba(96,165,250,.12);
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
  }

  /* ─── Essay view ─── */
  .view-essay { width: min(820px, 100%); }
  .essay-prompt {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 18px 22px;
    font-size: 17px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
  }
  .essay-prompt .label {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .5px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .essay-textarea {
    width: 100%;
    min-height: 50vh;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 16px 18px;
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16.5px;
    line-height: 1.65;
    resize: vertical;
  }
  .essay-textarea:focus { outline: none; border-color: var(--accent); }
  .essay-meta {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    padding: 0 4px;
  }
  .essay-meta .word-count { font-weight: 700; color: var(--text); }
  .essay-final {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
    padding: 20px 24px;
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }
</style>
</head>
<body>

<header class="app">
  <h1>Custom Test Practicer 9000</h1>
  <button class="back hidden" id="backBtn">← Home</button>
</header>

<!-- ─── HOME VIEW ─── -->
<div class="view-home" id="viewHome">
  <div class="grade-toggle">
    <button class="grade-pill" id="gradeLower">
      <div class="label">Lower Level</div>
      <div class="sub">Grades 4 → 5</div>
    </button>
    <button class="grade-pill" id="gradeBridge">
      <div class="label">Bridge Level</div>
      <div class="sub">Grade 5 → 6</div>
    </button>
    <button class="grade-pill active" id="gradeMiddle">
      <div class="label">Middle Level</div>
      <div class="sub">Grades 6 → 7</div>
    </button>
  </div>

  <div class="mode-toggle" role="tablist">
    <button id="modePractice" class="active" role="tab">Practice Mode</button>
    <button id="modeTest" role="tab">Test Mode</button>
  </div>
  <div class="mode-desc" id="modeDesc"></div>

  <div class="review-panel hidden" id="reviewPanel">
    <div class="info">

  passages: [
    { id: "lp1", title: "The Hidden Drawing", genre: "fiction", text: `Maya pushed open the door of her grandmother's attic and sneezed. Dust floated through a thin beam of sunlight. Boxes were stacked everywhere, each one labeled in her grandmother's neat handwriting.

She had come up to find an old lamp, but a wooden box near the window caught her eye. The lid creaked as she lifted it. Inside were stacks of yellow papers tied with a faded blue ribbon.

Maya pulled out the top paper and gasped. It was a drawing of a girl about her age, sitting under a tree with a small brown dog. In the corner, in tiny letters, was a name she knew very well: Grandma Rose, age 10.

Maya had no idea her grandmother could draw. At dinner, Grandma always said she "wasn't good at art things." But this picture looked almost real. The dog's ears even seemed soft.

Maya carefully retied the ribbon and carried the box downstairs. She wanted to ask her grandmother about the drawings, but mostly she wanted to know one thing. If Grandma was this talented as a kid, why had she stopped?` },
    { id: "lp2", title: "Octopus Brains", genre: "nonfiction", text: `Most animals keep their thinking inside their head. Octopuses do things differently. An octopus has nine brains in all. One large brain sits between its eyes, and eight smaller brains run down its arms, one for each arm.

This setup is very useful underwater. Each arm can taste, touch, and grab food on its own, even if the main brain is busy looking somewhere else. Scientists who study octopuses say it is a little like having eight helpers who do not need to be told what to do.

Octopuses are also great problem solvers. In labs, they have learned to open jars, pull levers, and escape from tanks through tiny holes. Some octopuses even seem to recognize the people who feed them, treating one keeper kindly while squirting water at another.

Their bodies are just as surprising as their brains. An octopus can change color in less than a second to match a rock or a patch of sand. Because they have no bones, they can squeeze through any opening larger than their hard beak.

Of all the animals in the ocean, few are stranger or smarter than the eight-armed octopus.` },
    { id: "lp3", title: "The Boy Who Watched the Stars", genre: "biography", text: `Long before he became a famous scientist, Edwin Hubble was a curious boy growing up in Missouri. Born in 1889, Edwin loved to read about faraway places and stare up at the night sky. His grandfather built him a small telescope when he was eight years old, and Edwin spent hours peering through it at the moon.

Edwin was not only smart. He was also a strong athlete. In high school, he broke the state record for the high jump and played on the basketball team. His teachers said he could do almost anything he tried.

For a while, Edwin studied law to please his father. But the stars kept calling him back. After his father died, Edwin finally decided to study what he truly loved: astronomy.

He went to work at a giant telescope in California. There, in the 1920s, Edwin made a discovery that surprised the whole world. He showed that our galaxy, the Milky Way, was not alone. There were countless other galaxies, far, far away.

Today, a famous space telescope is named after him, still helping us see what young Edwin once dreamed about.` },
    { id: "lp4", title: "How a Bridge Stands Up", genre: "informational", text: `A bridge may look simple, but holding up cars, trucks, and people takes clever design. Engineers have invented different kinds of bridges, each one good for a different job.

The oldest kind is the beam bridge. It is just a flat road resting on two supports, like a board across a puddle. Beam bridges work well for short distances, but they sag if they are too long.

Arch bridges are stronger. The curved arch underneath pushes the weight of the bridge outward to the ground on both sides. The Romans built stone arch bridges over two thousand years ago, and some are still standing today.

For very long distances, engineers often choose a suspension bridge. Tall towers hold up thick steel cables, and smaller cables hang down from those to support the road. The famous Golden Gate Bridge in California works this way.

No matter the design, every bridge must do two things. It must be strong enough to carry heavy loads, and it must bend just a little when the wind blows or trucks rumble across. A bridge that cannot bend at all might crack. Good engineers plan for both strength and movement.` },
    { id: "lp5", title: "The Tide Pool Surprise", genre: "fiction", text: `Maya had visited the rocky shore a dozen times, but she had never paid much attention to the little pools of seawater trapped between the rocks. Today her aunt handed her a small magnifying glass and a notebook. "Look slowly," Aunt Rosa said. "The best things hide."

At first, Maya only saw wet stones and slippery green stuff she thought was just plain seaweed. Then a tiny shadow moved. A hermit crab, no bigger than her thumbnail, scooted sideways across the sand. Behind it, a purple sea star clung to a rock like a sticker that refused to peel.

Maya pressed her face closer. Bubbles drifted up from a hole. Something was breathing down there. A small striped fish darted from a crack, swam in a quick circle, and vanished again. Maya laughed out loud.

She started sketching in her notebook, naming every creature she spotted. By the time the tide began creeping back in, she had filled three pages. "Same beach as always?" Aunt Rosa asked. Maya shook her head. "It was never the same beach," she said. "I just wasn't looking."` },
    { id: "lp6", title: "The Mighty Monarch Journey", genre: "nonfiction", text: `Every fall, millions of monarch butterflies begin one of the most amazing trips in the animal world. These orange and black insects, which weigh less than a paper clip, travel from Canada and the northern United States all the way to the mountains of central Mexico. The journey can be more than 2,500 miles long.

What makes the trip so surprising is that no single butterfly has ever made it before. The monarchs that fly south in autumn are the great-grandchildren of the ones that flew north the previous spring. Somehow, they know exactly where to go. Scientists think the butterflies use the position of the sun and a kind of natural compass inside their bodies.

When the monarchs arrive in Mexico, they gather by the millions on fir trees. The branches bend under their weight, and the forest looks as if it has burst into orange flames. The butterflies rest there through the cold months, barely moving to save energy.

In spring, they wake up, mate, and start the long trip back north. Their children and grandchildren finish the journey, ready to begin the cycle all over again.` },
    { id: "lp7", title: "The Girl Who Ran Like the Wind", genre: "biography", text: `When Wilma Rudolph was a small child in Tennessee, doctors told her family she might never walk again. She had been born early and had caught several serious illnesses, including polio, which left her left leg weak and twisted. For years, Wilma wore a heavy metal brace.

But Wilma had a stubborn heart. Her mother drove her many miles each week to a hospital for treatments, and at home, her brothers and sisters took turns rubbing her leg to help the muscles grow stronger. By the age of nine, Wilma surprised her doctors by taking off the brace and walking on her own. Soon she was running everywhere.

In high school, Wilma joined the track team and quickly became one of the fastest runners anyone had ever seen. At the 1960 Olympic Games in Rome, she won three gold medals, more than any American woman had ever earned at a single Olympics.

After her racing days, Wilma became a coach and teacher. She told young people that her story proved one important thing: a slow start does not have to mean a slow finish.` },
    { id: "lp8", title: "Inside the Beehive", genre: "informational", text: `A beehive may look like a simple lump of wax from the outside, but inside it is one of the busiest places in nature. A single hive can hold up to sixty thousand honeybees, and every bee has a job to do.

At the center of the hive lives one queen. She is larger than the other bees, and her main task is to lay eggs, sometimes more than a thousand in a single day. Around her, thousands of female worker bees keep the hive running. Young workers clean cells and feed the babies. Older workers build wax combs, guard the entrance, or fly out to collect nectar from flowers.

Bees talk to each other by dancing. When a worker finds a good patch of flowers, she returns to the hive and wiggles in a special pattern that tells the others where to fly. The angle of her dance points the way, and the length tells the distance.

Working together, the bees turn flower nectar into golden honey, sealing it in wax cells to feed the hive through winter.` },
    { id: "lp9", title: "Theo and the Lost Library Book", genre: "fiction", text: `Theo had checked out the same book about sharks three times already, and now he could not find it. He had searched under his bed, behind the couch, and even inside the laundry basket. The book was due tomorrow, and Theo's mother had warned him that one more late fee would mean no library trips for a month.

He sat on the kitchen floor with his chin in his hands. His little sister, Lila, wandered in carrying her stuffed rabbit. "Are you sad?" she asked. Theo nodded but did not look up. Lila patted his shoulder and then padded out of the room.

A minute later, she came back dragging the missing book behind her. The cover had a small smear of grape jelly on it, but the pages were fine. "I borrowed it," Lila said quietly. "The pictures are scary, but I like them."

Theo wanted to be angry, but he could not help laughing. He had been hunting for the book everywhere except his sister's pillow fort. "Next time," he said, "just ask. We can read it together."` },
    { id: "lp10", title: "The Lonely Lighthouse", genre: "informational", text: `Long before computers and satellites guided ships, lighthouses were the most important safety tools on the sea. A lighthouse is a tall tower built near dangerous coastlines, with a bright lamp at the top. The lamp's beam can reach more than twenty miles across the water, warning sailors away from hidden rocks.

Old lighthouses needed people to take care of them. These workers, called keepers, lived in small cottages at the base of the tower, often with their families. Every evening at sunset, the keeper climbed the spiral stairs to light the lamp. In the early days, the lamp burned whale oil or kerosene, and the keeper had to trim its wick and polish the glass each day.

Storms could be terrifying. Waves sometimes crashed right against the tower walls, and the wind howled so loudly that the keeper could not sleep. Still, the light had to stay on. A dark lighthouse could mean a shipwreck.

Today, most lighthouses run on electricity and need no one to watch them. But the tall white towers still stand along the coast, reminding us of the brave families who once kept the lights burning.` },
    { id: "lp11", title: "The Boy Who Drew Birds", genre: "biography", text: `John James Audubon was born in 1785 on a small island in the Caribbean Sea, but he grew up in France. From the time he could hold a pencil, he was happiest when drawing the birds he saw in the gardens and forests near his home.

When John was eighteen, his family sent him to live on a farm in Pennsylvania. There, he began doing something no one had ever done before. He decided to paint every kind of bird in North America, life-sized, in its natural surroundings. To do this, he spent days hiking through forests and wading through swamps.

Audubon's paintings were unlike any others of his time. Instead of stiff birds posed on a branch, his birds seemed to be flying, hunting, or feeding their young. He published his huge book, called The Birds of America, in 1838.

Today, a famous group that protects birds and wild places is named after him. Audubon taught the world to look at birds with new eyes.` },

Sunlight may look white, but it is really made of many colors mixed together, like a rainbow. When the sun is high in the sky during the day, its light has only a short distance to travel through the air before reaching your eyes. The blue parts of the light scatter the most, bouncing in every direction, which is why the daytime sky looks blue.

At sunset, the sun sits low on the horizon. Now its light has to travel through much more air to reach you. As the light pushes through all that extra air, most of the blue color scatters away long before it can arrive. What is left to reach your eyes is the warm end of the rainbow: yellow, orange, and red.

const READING = {
  passages: [
    { id: "p1", title: "The Compass in the Cookie Tin", genre: "fiction", text: `Mara had been digging in her grandmother's attic for almost an hour when her fingers brushed against something cold and round. She pulled a rusted cookie tin from beneath a stack of yellowing newspapers. The lid was stuck, painted shut by decades of damp summers, and it took both her thumbs and a butter knife to pry it loose.

Inside was no cookie. A brass compass, scratched but still gleaming faintly, sat on a square of folded paper. Mara lifted it carefully. The needle quivered, then settled, pointing not north but slightly east of it, as if confused. She frowned. Compasses were supposed to be certain things.

The folded paper turned out to be a map drawn in pencil, the lines so faint she had to angle it toward the dusty window. It showed her grandmother's backyard, the old oak, the shed, and a small X scratched between them. Beside the X, in handwriting Mara almost recognized from birthday cards, were the words: For when you are brave enough.

Mara sat back on her heels. Her grandmother had passed two months ago, and the family had been clearing the house in tired, polite shifts. No one had mentioned a compass. No one had mentioned a map. The discovery felt private, as though her grandmother had tucked it away knowing exactly who would find it.

She thought about calling her mother upstairs. Instead, she slipped the compass into her pocket, folded the map twice, and stood up. The attic floorboards creaked beneath her sneakers. Outside, the oak's shadow had crept across the lawn, almost reaching the shed.

Mara took a breath that felt bigger than her chest. Brave enough, the map had said. She wasn't sure yet whether she was. But the X was waiting, and the afternoon was still long, and the compass, however confused, was pointing somewhere.` },
    { id: "p2", title: "The Glass Frogs of the Cloud Forest", genre: "nonfiction", text: `High in the misty mountains of Central and South America, an unusual amphibian clings to leaves above rushing streams. The glass frog, no larger than a thumbnail, gets its name from a remarkable feature: the skin on its belly is almost completely transparent. If you flip one over (gently, as biologists do), you can see its tiny heart beating, the loops of its intestines, and the pale outlines of its bones.

Scientists long wondered why this transparency exists. A see-through belly does not help a frog blend in with green leaves. The answer turned out to be cleverer than simple camouflage. When a glass frog rests on a leaf during the day, light passing through its body softens the edges of its silhouette. To a hungry bird looking up from below, the frog looks less like a sharp frog-shape and more like a slightly darker patch of leaf. The trick is called edge diffusion, and it works best because the frog's organs are tucked into a tight, central bundle.

Even more surprising, glass frogs perform a kind of magic with their blood. When they sleep, they pull most of their red blood cells into a hidden pouch near their liver. With the red removed, their bodies become even more transparent. Almost no other animal can hide its own blood and survive.

Glass frogs live only in cool, humid forests, often near waterfalls where the air stays damp. Sadly, these forests are shrinking as land is cleared for farming and roads. Some species have already vanished from places where they were common a generation ago. Researchers continue to climb into the cloud forests, headlamps glowing in the mist, hoping to learn more about the glass frog before its quiet world disappears.` },
    { id: "p3", title: "Bessie Coleman Reaches for the Sky", genre: "biography", text: `Bessie Coleman grew up picking cotton in Texas in the early 1900s, but her imagination was never confined to the fields. She read every book she could borrow and listened, wide-eyed, to her older brother's stories from France during the First World War. He teased her once that French women could fly airplanes, while Black women in America could not. Bessie decided, quietly, to prove him wrong.

There was a problem. No flight school in the United States would accept her. Schools turned her away because she was Black, and turned her away again because she was a woman. Most people would have given up. Bessie took French lessons instead. She saved money from her job at a Chicago barbershop, and in 1920 she boarded a ship for France, where a respected aviation school agreed to enroll her.

Seven months later, she returned home as the first Black woman in the world to earn an international pilot's license. American newspapers, which had ignored her departure, suddenly noticed. Bessie became a celebrity at air shows, performing loops and dives that made crowds gasp. She refused, however, to perform at any show that would not admit Black spectators. If audiences wanted to see "Queen Bess" fly, they had to let everyone watch.

She dreamed of opening a flight school of her own so that other young Black Americans could learn to fly without crossing an ocean. Tragically, she died in a crash in 1926 before that dream could be built. But her example outlived her. Pilots she had inspired went on to train at the school she could not finish, and decades later, the first Black military pilots in the United States cited her name when asked who taught them to believe the sky was theirs.` },
    { id: "p4", title: "How a Geyser Builds Its Show", genre: "informational", text: `A geyser looks, from a distance, like a fountain that turns itself on. Steam rolls upward, water bursts skyward, and minutes later the whole spectacle settles back into a steaming pool. Underneath, though, a geyser is really a kind of natural plumbing problem, and understanding it begins with the rocks.

Geysers form only in rare places where three ingredients meet. First, there must be a heat source, usually magma not far below the surface. Second, there must be groundwater that can seep down into cracks and chambers in the rock. Third, the underground channels must be narrow and twisted, with constrictions that trap rising water instead of letting it flow freely upward.

Here is how the show is built. Cold water trickles down into a deep chamber and is heated by the surrounding rock. Because the column of water above it is heavy, the water at the bottom cannot boil at the usual temperature; the pressure raises its boiling point. Heat continues to build. Eventually, a small amount of water near the top begins to bubble and overflow. That overflow reduces the weight pressing down. The pressure drops, the superheated water below suddenly flashes into steam, and the steam shoves everything above it out of the ground in a roaring jet.

After the eruption, the chamber is mostly empty. Groundwater begins seeping in again. Heating resumes. The cycle restarts, sometimes within minutes, sometimes over many hours. Old Faithful in Yellowstone is famous because its plumbing is unusually regular, but most geysers are moody and unpredictable.

There are fewer than a thousand active geysers on the planet. They are fragile, too: anything that clogs the underground channels, from earthquakes to tossed coins, can silence a geyser forever.` },
    { id: "p5", title: "The Last Train to Marrowfield", genre: "fiction", text: `Devon pressed her forehead against the cold window of the train and watched the prairie slide past in long brown ribbons. Her older brother Caleb sat across from her, pretending to read a magazine, but she could tell he was just turning pages without looking at them.

"It won't be like before," he said finally, without raising his eyes. "You should know that."

Devon shrugged. She did know. Their grandfather's farmhouse in Marrowfield had been sold three years ago, and the new owners had painted the porch a startling shade of teal. Aunt Lila lived in town now, above the hardware store, and the dog Devon remembered chasing through the wheat had died last spring. Still, she had begged for this trip — one last visit before Caleb left for college in Oregon.

The conductor passed through the car, punching tickets. He paused at their seats and tipped his cap. "First time on the Westbound?" he asked.

"No, sir," Devon said. "But it's been a while."

He smiled and moved on. Devon noticed Caleb watching her, and for a second his face looked exactly like their father's — the same crooked half-smile, the same small crease between the eyebrows. She looked away quickly, suddenly embarrassed, though she could not have said why.

Outside, the light was beginning to thicken into evening. A line of grain elevators rose on the horizon like pale teeth. Devon counted them under her breath: one, two, three, four. When she was small, she had believed that counting them brought good luck. She had not done it in years.

"Caleb," she said.

"Hmm?"

"Do you think Aunt Lila will recognize us?"

He laughed, surprised. "Of course she will. We're not strangers."

But Devon was not so sure. Strangers, she thought, were sometimes only people you used to know.` },
    { id: "p6", title: "The Lost Library of Timbuktu", genre: "nonfiction", text: `For most of the twentieth century, scholars believed that sub-Saharan Africa had produced little in the way of written history. They were spectacularly wrong. Hidden in the houses, courtyards, and underground chambers of Timbuktu — a small city in the West African nation of Mali — lay one of the great treasures of the written word: hundreds of thousands of handwritten manuscripts, some dating back more than seven hundred years.

Timbuktu was once a wealthy crossroads of trade, where caravans carrying salt from the Sahara met traders bringing gold from the southern forests. By the 1400s, the city was also a center of learning. Its three great mosques served as universities, and scholars came from as far away as Spain and Egypt to study astronomy, medicine, mathematics, and Islamic law. They wrote on paper imported from Italy, copying texts in elegant Arabic script and binding the pages in leather covers stamped with intricate patterns.

When the city's fortunes declined in the seventeenth century, the manuscripts did not disappear. Instead, the families of Timbuktu hid them. Some were buried in iron trunks. Others were sealed inside the walls of homes or carried out into the desert and stored in caves. For generations, sons and daughters guarded the collections their ancestors had assembled, often without reading them.

In 2012, the manuscripts faced their greatest danger. An armed group seized Timbuktu and threatened to destroy the texts, which they considered offensive. Working in secret, librarians and ordinary citizens smuggled nearly 350,000 manuscripts out of the city, hiding them in rice sacks and floating them down the Niger River in small boats. Almost all of them survived.

Today, researchers in Mali and around the world are slowly translating and digitizing the manuscripts. Each page they decipher rewrites a piece of history that was never truly lost — only waiting for someone to listen.` },
    { id: "p7", title: "Why a Curveball Curves", genre: "informational", text: `A good curveball can be one of the most baffling sights in baseball. The ball leaves the pitcher's hand traveling toward the center of the plate, and then — somehow — it dives sideways or drops sharply just before the batter swings. For more than a century, players and fans argued about whether the curve was real or simply an optical illusion. Today, physicists can explain exactly how it works.

The secret lies in spin. When a pitcher throws a curveball, the fingers snap downward at the moment of release, giving the ball a fast forward rotation. As the ball spins through the air, the seams catch the surrounding air molecules and drag a thin layer of air around with them. On one side of the ball, this dragged air moves in the same direction as the wind rushing past; on the other side, it moves against it.

This difference creates uneven air pressure. The side where the dragged air moves with the wind has lower pressure, and the side where it moves against the wind has higher pressure. The ball is pushed from the high-pressure side toward the low-pressure side. Scientists call this the Magnus effect, named for the German physicist Heinrich Magnus, who studied it in the 1850s — long before baseball became popular.

The amount of curve depends on several factors: how fast the ball spins, how fast it travels, and even the weather. Humid air is actually less dense than dry air, which slightly reduces the Magnus effect. That is one reason curveballs behave differently in Denver, where the thin mountain air gives the seams less to grip.

So the next time you see a batter swing wildly at a pitch that seemed to bend in midair, remember: the ball is not playing tricks. It is obeying the same physical laws that move airplanes, soccer balls, and even spinning rockets through the sky.` },
    { id: "p8", title: "The Goalkeeper's Gloves", genre: "fiction", text: `Mira had never wanted to play goalkeeper. She liked running, sprinting up the wing, feeling the wind tug at her jersey. But when Coach Patel announced that Lin had sprained her wrist, his eyes settled on Mira, and she knew what was coming.

"Just for the tournament," he said gently, holding out a pair of bright yellow gloves. "You have quick hands and you're not afraid of the ball. That's most of the job."

The gloves felt strange, padded and stiff, like wearing two oven mitts. During warm-ups, Mira fumbled three easy catches in a row. Her teammate Devon jogged over and bumped her shoulder. "Pretend the ball is a baby bird," he said. "Cup it, don't slap it." Mira tried again. The next shot stuck in her palms like it had been waiting there.

The match against Riverton started badly. A forward in a red jersey beat their defense and bore down on goal. Mira's stomach twisted. She remembered Devon's words and crouched low, eyes locked on the ball. The forward shot hard and low, but Mira dove sideways and the ball thudded into her chest. The crowd erupted.

For the next forty minutes she dove, punched, and shouted at her defenders the way she had heard Lin do a hundred times. Riverton scored once, on a deflection no one could have stopped. But her own team scored twice, and when the referee blew the final whistle, Devon sprinted across the field and lifted her off her feet.

Walking back to the bus, Mira realized the gloves no longer felt strange. They felt like something she had earned.` },
    { id: "p9", title: "Mapping the Hidden Ocean Floor", genre: "biography", text: `For most of human history, the bottom of the ocean was a mystery. Sailors knew the surface, and fishermen knew the shallows, but the deep sea floor was hidden under miles of dark water. That began to change in the 1950s, thanks largely to a quiet American scientist named Marie Tharp.

Tharp studied geology at a time when women were rarely allowed on research ships. Her boss at Columbia University, Bruce Heezen, sailed the Atlantic measuring depth with sound waves. He sent the long rolls of data back to Tharp, who worked at a drafting table on land. Using ink, rulers, and patience, she translated thousands of numbers into the first detailed map of the Atlantic Ocean's hidden landscape.

As she drew, Tharp noticed something strange. Running down the middle of the ocean was an enormous mountain range, and along its top was a deep, narrow valley. She suspected the valley was a rift, a place where the seafloor was splitting apart. At the time, most geologists rejected the idea that continents could move. Heezen even called her discovery "girl talk" and asked her to check her work. She did, again and again, and the valley was still there.

Eventually the evidence became too strong to ignore. Tharp's maps helped convince scientists that the theory of plate tectonics was correct. Marie Tharp kept drawing maps for decades, eventually charting every ocean on Earth. Today, every map of the seafloor in every textbook owes something to the woman who turned columns of numbers into mountains, valleys, and proof that our planet is alive beneath the waves.` },
    { id: "p10", title: "How a Beehive Stays Cool", genre: "nonfiction", text: `On a hot summer afternoon, the inside of a beehive can become a dangerous place. Honeybees build their combs out of wax, and wax begins to soften at about 95 degrees Fahrenheit. If the hive grows much warmer than that, the combs can sag, the honey can leak, and developing baby bees can die. To prevent disaster, honeybees have developed a remarkable system of air conditioning.

The first line of defense is ventilation. Worker bees called fanners stand near the hive entrance and beat their wings rapidly, pulling cool outside air in and pushing warm inside air out. A large colony may have hundreds of fanners working in shifts.

When fanning is not enough, bees turn to evaporation, the same trick that cools human skin when we sweat. Foragers collect water and carry it back to the hive in their stomachs. Inside, they spread the water in thin films across the combs. Other bees fan over the wet surfaces, and as the water evaporates, it pulls heat away.

The most surprising part is how organized it is. No single bee is in charge. Instead, each worker reacts to small changes in temperature she can feel on her own body. Multiplied across thousands of bees, these tiny decisions add up to a kind of group thermostat. Scientists call this swarm intelligence.` },
    { id: "p11", title: "The Dwarf Planet at the Edge", genre: "nonfiction", text: `In 1930, a 24-year-old farm boy from Kansas named Clyde Tombaugh squinted through a special device called a blink comparator. The machine flipped between two photographs of the same patch of night sky, taken six nights apart. Almost everything in the pictures held still. But one tiny dot moved. That dot was Pluto.

For 76 years, students learned that the solar system had nine planets, and Pluto was the smallest and most distant. Then, in the 1990s and early 2000s, astronomers began finding other small icy worlds beyond Neptune. Some were nearly as large as Pluto, and one, named Eris, seemed to be larger.

In 2006, the International Astronomical Union made a controversial decision. They created a new category called dwarf planet. To qualify as a full planet, an object must orbit the Sun, be round, and have cleared other debris out of its orbital path. Pluto met the first two rules but not the third. It was reclassified as a dwarf planet.

Many people were unhappy. Pluto had captured imaginations for generations. In 2015, the New Horizons spacecraft flew past Pluto and sent back stunning photographs showing heart-shaped plains of frozen nitrogen, mountains made of water ice, and a thin blue atmosphere. The little world at the edge of the solar system reminded us that the universe rarely fits neatly into the categories we invent for it.` },
    { id: "p12", title: "The Mystery in the Museum Basement", genre: "fiction", text: `Owen had visited the Westbrook Natural History Museum at least twenty times, but he had never been in the basement. So when Dr. Reyes, the curator, asked him to help carry boxes during a Saturday volunteer day, he agreed immediately. The basement was a maze of metal shelves stretching farther than the public galleries upstairs.

Owen carried boxes for an hour before he noticed it: a small wooden crate, tucked behind a row of fossil drawers, with a label that read PROPERTY OF E. HARLOW, 1923. A paper tag dangled from the lid with a single word: RETURN.

Curious, Owen asked Dr. Reyes about it. She frowned and lifted the crate onto a worktable. Inside, wrapped in yellow newspaper, were three smooth gray stones carved with tiny pictures of birds and fish. "Petroglyphs," she whispered. "But I've never seen this crate before."

They searched the museum's records together. Eventually they found a folder. Evelyn Harlow had been a young researcher who collected the stones from a riverbank in Oregon in 1923. According to a letter inside, she had promised the local community she would return the stones once they had been studied. She died in 1924 of influenza.

Dr. Reyes looked at Owen. "We need to keep her promise," she said. Walking home that afternoon, Owen had not discovered a dinosaur or a treasure. He had only noticed a crate that everyone else had walked past for a hundred years. But sometimes, he realized, noticing is its own kind of discovery.` },
    { id: "p13", title: "The Diver Who Held Her Breath", genre: "biography", text: `Natalia Molchanova grew up far from the ocean, in a city deep inside Russia. She swam competitively as a teenager but gave up the sport in her twenties to raise her children. Most people would have assumed her athletic career was over. Instead, at the age of 40, Natalia took up a sport almost no one in her country had heard of: freediving.

Freedivers descend into the sea on a single breath, without scuba tanks. They rely only on their lungs, their training, and their ability to stay calm under enormous pressure. The deeper a diver goes, the more the water squeezes the body. Lungs shrink to the size of oranges, and heart rates can drop to a fraction of normal. Panic, in such conditions, is deadly.

Natalia turned out to have an extraordinary gift. Within a few years she was setting world records. She could hold her breath for more than nine minutes while floating motionless. She dove past 100 meters below the surface without any equipment, returning by kicking alone.

What made her remarkable was not only her body but her mind. She wrote poetry about the sea and taught her students to meditate before each dive. She believed the goal was not to fight the water but to become part of it. Fear, she said, used up oxygen. Calm preserved it. She proved that a person could begin a career at 40 and still rewrite the limits of what the human body could do.` },
    { id: "p14", title: "A Letter to the Stage", genre: "fiction", text: `Jasmine read the email three times to make sure she had not misunderstood. The drama club had selected her play, "Tuesday in the Laundromat," for the spring showcase. She would have to direct it herself.

Her excitement lasted about ten minutes. Then panic set in. She had written the play in a notebook during long bus rides home, half pretending it was just for fun. What if the actors hated it? What if she gave bad directions?

The first rehearsal almost confirmed her fears. The actors stumbled over the dialogue. One of them, a boy named Theo, kept laughing at his own jokes before he delivered them. Jasmine stood in the back of the theater with her arms folded, unable to speak.

Mr. Okafor pulled her aside. "Your script is good," he said. "But right now you're treating it like a stranger's. You wrote these people. You know how they talk. Get up there and show your actors what you hear in your head."

The next rehearsal, Jasmine climbed onto the stage. She walked through the laundromat scene as if she were one of the characters, miming the folding of a towel, mumbling the lines under her breath. The actors watched, then began to copy her rhythm. Theo stopped laughing too early. The dialogue started to sound like real conversation.

On opening night, when the audience laughed at the joke she had been most worried about, something inside her loosened. By the curtain call, she was grinning so hard her cheeks hurt.` },
    { id: "p15", title: "Reading the Stars Across the Pacific", genre: "nonfiction", text: `Long before Europeans built ships that could cross open oceans, the people of the Pacific Islands were already doing it. Polynesian navigators sailed thousands of miles in double-hulled canoes, traveling between tiny islands separated by enormous stretches of empty sea. They did this without compasses, charts, or any of the instruments European sailors would later rely on.

A Polynesian navigator memorized the rising and setting points of dozens of stars. By watching which stars climbed out of the horizon at night, the navigator could tell which direction the canoe was heading. During the day, the position of the sun and the angle of the swells served the same purpose. Long ocean swells, generated by distant storms, travel in steady patterns. An experienced sailor could feel them rolling under the hull.

Wildlife provided clues too. Certain seabirds fly out from islands at dawn to hunt and return at dusk. By watching the direction of their flight, navigators could find land they could not yet see.

The training itself was demanding. Apprentice navigators spent years memorizing star charts laid out in pebbles on the floor of a teaching house. They learned chants that listed islands, distances, and the stars that pointed to them.

European explorers who reached the Pacific in the 1700s assumed the islanders must have arrived by accident, drifting on currents. We now know the truth. The settlement of the Pacific was one of the boldest voyages of exploration in human history.` },
    { id: "p16", title: "The Painter of Hidden Worlds", genre: "biography", text: `Maria Sibylla Merian was born in Germany in 1647, at a time when most Europeans believed that insects appeared by magic, growing spontaneously out of mud or rotting food. As a young girl, Maria began collecting caterpillars and watching them in jars on her windowsill. She drew what she saw and discovered that caterpillars hatched from eggs, ate leaves, spun cocoons, and emerged transformed into moths or butterflies.

Maria turned her observations into paintings. Unlike other natural history artists of her time, she did not just paint the adult insect alone on a blank page. She painted the whole story: the egg, the caterpillar, the cocoon, the adult, and the exact plant each species preferred to eat. Her work was both art and science.

In 1699, at the age of 52, Maria did something almost unheard of for a woman of her century. She sold her possessions, boarded a ship with her younger daughter, and sailed to the South American colony of Suriname to study tropical insects. For two years she trekked through the rainforest, painting moths the size of saucers and beetles that glowed in the dark.

The book she published from that journey, filled with hand-colored engravings, made her famous across Europe. After her death, her reputation faded for nearly two hundred years, partly because later scholars thought a woman could not have produced such precise scientific work. Today, biologists recognize Maria Sibylla Merian as one of the founders of entomology.` },
    { id: "p17", title: "How a Lock Lifts a Boat", genre: "informational", text: `Rivers do not flow in flat lines. A waterway that begins high in the mountains may drop hundreds of feet before it reaches the sea. For thousands of years, this presented a problem for anyone who wanted to move cargo by boat. A barge floating downstream could shoot over rapids or waterfalls, but it could never come back up. Engineers solved this puzzle with an invention called a lock.

A lock is essentially a giant water elevator. It consists of a rectangular chamber with heavy gates at each end. When a boat needs to travel upstream, the lower gates open and the boat motors inside. The lower gates close behind it. Then valves open in the upper gates, and water from the higher section of the river pours in. The boat rises with the water.

The process works in reverse for boats traveling downstream. No pumps are needed for most locks. Gravity alone moves the water, which means locks can operate even during power outages.

Some lock systems are enormous. The Panama Canal uses a series of locks to lift ships 85 feet above sea level. China's Three Gorges Dam has a five-step lock that can raise a vessel the height of a 30-story building.

Locks are one of those quiet technologies most people rarely think about. Yet without them, much of the world's trade would still be stuck at the bottom of a hill.` },
    { id: "p18", title: "Dust Storms on Mars", genre: "nonfiction", text: `Mars is a small, cold, mostly silent world. Its atmosphere is so thin that a person standing on the surface without a spacesuit would suffocate in seconds. Yet despite its emptiness, Mars has weather. The planet is famous for its dust storms, which can grow large enough to wrap the entire globe in a reddish haze.

A Martian dust storm usually begins as a small disturbance. Sunlight warms patches of the surface unevenly, creating winds that pick up fine particles of dust and lift them into the sky. The dust is extremely light, and once airborne it can stay suspended for weeks. The biggest storms, called global dust events, occur every few Martian years and may last for months.

These storms are not as violent as they sound. Because the Martian atmosphere is so thin, even a 60-mile-per-hour wind there has only a fraction of the force of the same wind on Earth. The real danger is not impact but darkness. When a global storm settles in, the sky turns from butterscotch to brown to nearly black.

In 2018, a global storm ended the mission of NASA's Opportunity rover, which had been exploring the planet for almost 15 years. Its batteries ran down, and engineers were never able to wake it up.

The red planet, it turns out, is not as quiet as it looks. It just whispers in a language we are still learning to hear.` },
    { id: "p19", title: "The Bridge Builder", genre: "fiction", text: `Hassan had spent three weekends in a row on the same project. His science fair entry was a model bridge made of nothing but uncooked spaghetti and white glue. The rules required that the bridge span 16 inches across two desks and hold as much weight as possible without collapsing. His current attempt had failed at four pounds.

His older sister Layla peered over his shoulder. "You're putting all the noodles in the same direction," she said. "That's why it bends."

Hassan rolled his eyes. But that night, after she went to bed, he searched online and read about something called a truss. Engineers did not build bridges out of straight beams alone. They built them out of triangles. A triangle, unlike a square, cannot be squashed without breaking one of its sides.

He started over. He glued his spaghetti into long thin triangles and joined the triangles into a deep beam. The whole structure took two more weekends and a small ocean of glue.

On the day of the fair, the judges hung a bucket from the center of his bridge and began to add weights. One pound. Five. Ten. At 22 pounds the bridge let out a creak, but it held. When it finally cracked at 31 pounds, the crowd around the table actually applauded.

Hassan glanced at Layla in the back of the gym. She was grinning. He decided, just this once, not to mind that she had been right.` },
    { id: "p20", title: "The Hidden Language of Trees", genre: "informational", text: `A forest can look like a collection of separate trees, each one growing in its own patch of soil, competing with its neighbors for sunlight and water. For most of the 20th century, that is exactly how scientists described it. Then a Canadian forest ecologist named Suzanne Simard began to suspect that the picture was incomplete. Trees, she thought, might be talking to each other.

Her tools were unusual. She injected one set of young trees with a harmless form of radioactive carbon dioxide and a different set of nearby trees with a stable form. A few days later, she used a Geiger counter to scan the trees. The radioactive carbon had moved from one tree species into another, even though their leaves never touched.

That something turned out to be a network of fungi. Long threads called mycelium grow in the soil beneath most forests, wrapping themselves around tree roots in a partnership called a mycorrhiza. Simard discovered that the same fungal threads connect different trees, allowing them to swap nutrients and even chemical warning signals.

Old, large trees, sometimes called mother trees, can send extra sugar through the network to small saplings struggling in the shade. When a tree is attacked by insects, it can release chemicals that travel through the fungi to nearby trees, which then strengthen their own defenses.

A forest, it turns out, is less like a crowd of strangers and more like a neighborhood that has been quietly looking out for itself all along.` }

    { id: "bp1", title: "The Saturday Inventor", genre: "fiction",
      text: `Maya spread her supplies across the kitchen table: rubber bands, cardboard tubes, three plastic spoons, and a roll of tape that was already losing its stick. The school's Invention Fair was Monday, and so far her best idea was a "self-stirring" cereal bowl that did not actually stir anything.

Her older brother Theo wandered in, took one look at the mess, and snorted. "Let me guess. Another cereal bowl?"

"It's a marble launcher," Maya said firmly, even though she had only decided this five seconds ago. She taped two spoons to a cardboard tube, stretched a rubber band between them, and dropped a marble in. When she pulled back and let go, the marble flew exactly four inches before rolling sadly off the table.

Theo laughed, but then he sat down. "The rubber band's too loose. And your spoons are pointing the wrong way." He flipped one spoon around so it cupped the marble instead of letting it slide off.

Maya tried again. This time the marble shot across the kitchen and bounced off the refrigerator with a satisfying ping. She grinned so wide her cheeks hurt.

"Okay," Theo said, pretending not to be impressed. "But you need a target. Inventions need a point."

By dinner, Maya had built a cardboard castle with paper soldiers on top. The launcher knocked them down one by one.` },
    { id: "bp2", title: "The Night Shift in the Garden", genre: "nonfiction",
      text: `When the sun goes down, most flowers close their petals and rest. But a small group of plants does the opposite. These night-blooming flowers wait until darkness falls, then open wide to greet a very different crowd of visitors.

During the day, gardens are busy with bees, butterflies, and hummingbirds. These animals find flowers using bright colors and sweet smells. At night, however, those colorful petals would be useless. Most night creatures cannot see red or yellow in the dark. So night-blooming plants take a different approach. Their petals are usually white or pale, which reflects what little moonlight there is. Their scents are also much stronger, sometimes carrying for hundreds of feet through the still night air.

The visitors these flowers attract are surprising. Moths are the most common pollinators, fluttering from bloom to bloom on dusty wings. In some parts of the world, bats also do the job. Even certain beetles get involved, crawling into wide blossoms and staying the night.

Scientists believe night blooming evolved because the daytime competition for pollinators is fierce. By opening after dark, these plants find quieter customers and avoid the crowd.` },
    { id: "bp3", title: "The Boy Who Mapped the Cold", genre: "biography",
      text: `Matthew Henson grew up in Maryland in the 1870s, the son of free Black farmers. By the time he was twelve, both his parents had died, and he set out on his own. He walked to Washington, then to Baltimore, where he talked his way onto a merchant ship as a cabin boy. The captain taught him to read charts, handle ropes, and navigate by the stars. By the time Henson was a young man, he had sailed across three oceans.

In 1887, he met an explorer named Robert Peary, who was planning trips to the Arctic. Peary needed someone strong, clever, and willing to face brutal cold. Henson agreed. Over the next twenty-two years, the two men made several attempts to reach the North Pole.

Henson became the team's most skilled member. He learned the Inuktitut language from the Inuit people of Greenland, who shared their knowledge of sled-building, dog handling, and surviving on the ice.

In April 1909, after weeks of brutal travel across drifting sea ice, a small group reached what they believed was the North Pole. Henson was at the front, breaking trail. For decades, history books gave most of the credit to Peary alone. Today his name appears in museums, on stamps, and in books that finally tell the whole story.` },
    { id: "bp4", title: "How a Snowflake Gets Its Shape", genre: "informational",
      text: `No two snowflakes are exactly alike, but every single one starts the same way: with a speck of dust floating high in a cloud. When the air around that speck is cold enough, water vapor freezes onto it, forming a tiny six-sided crystal. From that moment on, the snowflake begins a long, twisting journey toward the ground.

The six-sided shape is not an accident. Water molecules naturally lock together at angles that produce hexagons. As the crystal falls, more water vapor freezes onto its edges, and tiny arms begin to grow outward from each of the six corners.

The exact shape a snowflake takes depends on the temperature and humidity of every layer of air it passes through. A flake that drifts through warmer, wetter air may grow wide, flat plates. One that travels through colder, drier air may sprout long needles instead. Because no two snowflakes follow the exact same path, no two end up looking exactly the same.

Each flake in your hand carries a tiny record of the sky it just fell through.` },
    { id: "bp5", title: "The Treehouse Vote", genre: "fiction",
      text: `Jordan and his cousins had been working on the treehouse all summer. By August, the platform was finally finished, and the four of them sat on it, sweaty and proud. Now came the hard part: deciding what to put inside.

"A reading corner," said Priya, who always had a book in her backpack. "With pillows."

"A snack station," said Marcus, who always had crumbs on his shirt. "With a cooler."

"A lookout tower," said Jordan. He had wanted a lookout tower since he first saw the tree.

The fourth cousin, little Ezra, was only seven. He pulled at his shoelaces and said quietly, "A place where everybody can fit."

Nobody answered right away. The platform was big, but not huge. They could not have all three things, and four people meant any vote would end in a tie.

Priya sighed first. "Okay. What if the reading corner is also the snack spot? Pillows are good for sitting and eating."

Marcus shrugged. "Fine by me, as long as the cooler fits."

Jordan stared up through the leaves. A lookout tower would have been amazing. But he pictured himself sitting alone in it while the others laughed below. "We could put a window on that side," he said, pointing. "Anyone can look out."

Ezra grinned and bounced on his heels. They spent the rest of the afternoon arguing about pillow colors, which felt, somehow, like a victory.` },
    { id: "bp6", title: "The Town Under the Sand", genre: "informational",
      text: `In the deserts of southern Africa lies a place called Kolmanskop. Today it is silent. Sand pours through broken windows and piles up against doors that have not opened in decades. But a hundred years ago, Kolmanskop was one of the richest towns in the region.

The story began in 1908, when a railway worker noticed something glittering in the sand. It turned out to be a diamond. Word spread quickly, and within months, miners and their families had rushed in to dig for more.

The town that grew up around the diamond fields was unlike anything else in the desert. Kolmanskop had a hospital with the first X-ray machine in southern Africa. It had a bowling alley, a theater, an ice factory, and even a tram that carried fresh water from the coast.

But the diamonds did not last forever. By the 1930s, miners began finding larger deposits farther south. People packed up and left, taking what they could carry. The desert wasted no time. Wind carried sand through every open window, and dunes climbed slowly up staircases and into bedrooms.

Today Kolmanskop is a ghost town that visitors can tour.` }

// REGISTRIES — global lookups built at boot for all grades
// ════════════════════════════════════════════════════════════════════════════
const QUESTION_REGISTRY = {};   // id (with grade prefix) → { entry, sectionKey, gradeLevel }
const PASSAGE_LOOKUP = {};      // passage id (e.g. "p1", "lp1") → passage object

function entryId(gradeLevel, sectionKey, idx) {
  return `${gradeLevel}-${sectionKey}-${idx}`;
}

function buildRegistries() {
  for (const gradeKey of Object.keys(GRADES)) {
    const g = GRADES[gradeKey];
    for (const section of SECTIONS) {
      if (section.isEssay) continue;
      const pool = section.isReading ? g.pools.reading.questions : g.pools[section.poolKey];
      pool.forEach((entry, idx) => {
        const id = entryId(gradeKey, section.key, idx);
        QUESTION_REGISTRY[id] = { entry, sectionKey: section.key, gradeLevel: gradeKey };
      });
    }
    g.pools.reading.passages.forEach(p => { PASSAGE_LOOKUP[p.id] = p; });
  }
}

function poolFor(section) {
